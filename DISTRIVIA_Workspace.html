<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>DISTRIVIA Workspace</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230F2A4A'/%3E%3Ctext x='32' y='42' font-family='Arial,sans-serif' font-size='30' font-weight='bold' fill='white' text-anchor='middle'%3EW%3C/text%3E%3Crect x='18' y='48' width='28' height='4' fill='%23C85E2D'/%3E%3C/svg%3E">
<style>
  :root{
    --bleu:#0F2A4A; --bleu2:#1B3D63; --bleu3:#26517f; --terra:#C85E2D; --terra2:#E0764A; --creme:#F5F1E8;
    --anthra:#1A1A1A; --gris:#888880; --gris2:#B9B9B0; --blanc:#FFFFFF; --vert:#2E6B3E; --vert2:#3E8B52; --rouge:#A33B3B; --jaune:#C9962B;
    --ombre:0 2px 10px rgba(15,42,74,.07); --ombre2:0 8px 28px rgba(15,42,74,.16);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Segoe UI', system-ui, -apple-system, sans-serif; background:var(--creme); color:var(--anthra); font-size:14.5px; line-height:1.5; -webkit-tap-highlight-color:transparent;}
  h1,h2,h3,h4{font-family:'Segoe UI', system-ui, sans-serif;}
  a{color:var(--terra); text-decoration:none;}
  input,select,textarea,button{font-family:inherit; font-size:14px;}
  label{display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--gris); margin:10px 0 4px;}
  input:not([type=checkbox]):not([type=radio]),select,textarea{width:100%; padding:10px 12px; border:1px solid #ddd6c8; border-radius:9px; background:#fff; outline:none;}
  input:focus,select:focus,textarea:focus{border-color:var(--bleu2); box-shadow:0 0 0 3px rgba(27,61,99,.1);}
  textarea{resize:vertical; min-height:70px;}
  .btn{background:var(--bleu); color:#fff; border:none; border-radius:9px; padding:10px 18px; font-weight:700; cursor:pointer; transition:.15s; display:inline-flex; align-items:center; gap:7px; justify-content:center;}
  .btn:hover{background:var(--bleu2);}
  .btn.b{background:var(--terra);} .btn.b:hover{background:var(--terra2);}
  .btn.v{background:var(--vert);} .btn.v:hover{background:var(--vert2);}
  .btn.r{background:var(--rouge);}
  .btn.ghost{background:#fff; color:var(--bleu); border:1px solid #ddd6c8;}
  .btn.ghost:hover{background:var(--creme);}
  .btn.sm{padding:6px 12px; font-size:12.5px; border-radius:7px;}
  .btn.full{width:100%;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .muted{color:var(--gris);}
  .pill{display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:700;}
  .pill.todo{background:#EFE9DB; color:#6b6456;}
  .pill.doing{background:#E2EEF6; color:#1B3D63;}
  .pill.done{background:#DCEFE0; color:#2E6B3E;}
  .pill.high{background:#F6E0E0; color:#A33B3B;}
  .pill.med{background:#F6EEDB; color:#9a7016;}
  .pill.low{background:#E8E8E2; color:#777;}
  .pill.pending{background:#F6EEDB; color:#9a7016;}
  .pill.approved{background:#DCEFE0; color:#2E6B3E;}
  .pill.rejected{background:#F6E0E0; color:#A33B3B;}
  .dot{width:9px; height:9px; border-radius:50%; display:inline-block;}
  .dot.on{background:#3E8B52;} .dot.off{background:#C9C9C0;}

  /* ===== LOGIN ===== */
  .login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:linear-gradient(135deg,#0F2A4A 0%,#1B3D63 100%);}
  .login-card{background:#fff; border-radius:18px; padding:38px 32px; width:100%; max-width:400px; box-shadow:var(--ombre2);}
  .login-logo{text-align:center; margin-bottom:24px;}
  .login-logo .wm{font-size:26px; font-weight:800; letter-spacing:4px; color:var(--bleu);}
  .login-logo .bar{width:64px; height:3px; background:var(--terra); margin:5px auto;}
  .login-logo .sub{font-size:10px; letter-spacing:3px; color:var(--gris); font-weight:600;}
  .login-logo .ws{margin-top:10px; font-size:13px; color:var(--terra); font-weight:700; letter-spacing:1px;}
  .err{background:#FBE9E9; color:#A33B3B; padding:9px 12px; border-radius:8px; font-size:13px; margin-top:10px;}
  .ok{background:#E5F2E8; color:#2E6B3E; padding:9px 12px; border-radius:8px; font-size:13px; margin-top:10px;}

  /* ===== APP SHELL ===== */
  .shell{display:flex; min-height:100vh;}
  .sidebar{width:230px; background:var(--bleu); color:#fff; display:flex; flex-direction:column; position:fixed; top:0; bottom:0; left:0; z-index:40; transition:transform .25s;}
  .sb-logo{padding:18px 20px 14px; border-bottom:1px solid rgba(255,255,255,.1);}
  .sb-logo .wm{font-size:19px; font-weight:800; letter-spacing:3px;}
  .sb-logo .bar{width:46px; height:3px; background:var(--terra); margin:3px 0;}
  .sb-logo .sub{font-size:9px; letter-spacing:2px; color:#9FB2C9; font-weight:600;}
  .sb-nav{flex:1; overflow-y:auto; padding:10px 0;}
  .sb-nav button{display:flex; align-items:center; gap:11px; width:100%; background:none; border:none; color:#C9D4E2; font-weight:600; font-size:14px; padding:11px 20px; cursor:pointer; text-align:left; position:relative;}
  .sb-nav button:hover{background:rgba(255,255,255,.07); color:#fff;}
  .sb-nav button.active{background:var(--bleu2); color:#fff;}
  .sb-nav button.active::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--terra);}
  .sb-nav .ico{font-size:17px; width:22px; text-align:center;}
  .sb-nav .badge{margin-left:auto; background:var(--terra); color:#fff; font-size:11px; font-weight:700; padding:1px 8px; border-radius:20px;}
  .sb-foot{padding:14px 20px; border-top:1px solid rgba(255,255,255,.1); font-size:12px;}
  .sb-foot .who{display:flex; align-items:center; gap:9px; margin-bottom:8px;}
  .avatar{width:34px; height:34px; border-radius:50%; background:var(--terra); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0;}
  .avatar.sm{width:28px; height:28px; font-size:12px;}
  .avatar.lg{width:46px; height:46px; font-size:18px;}
  .main{flex:1; margin-left:230px; display:flex; flex-direction:column; min-height:100vh;}
  .topbar{background:#fff; border-bottom:1px solid #E8E2D4; padding:12px 22px; display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:30;}
  .topbar .menu-btn{display:none; background:none; border:none; font-size:22px; cursor:pointer; color:var(--bleu);}
  .topbar h2{font-size:18px; color:var(--bleu);}
  .topbar .sp{flex:1;}
  .content{padding:22px; flex:1;}
  .panel{background:#fff; border-radius:14px; padding:18px; box-shadow:var(--ombre); margin-bottom:16px;}
  .panel h3{font-size:15px; color:var(--bleu); margin-bottom:10px; display:flex; align-items:center; gap:8px;}
  .grid{display:grid; gap:14px;}
  .g2{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(3,1fr);} .g4{grid-template-columns:repeat(4,1fr);}
  .empty{text-align:center; color:var(--gris); padding:26px; font-size:13.5px;}

  /* cards stat */
  .stat{background:#fff; border-radius:14px; padding:16px; box-shadow:var(--ombre); border-left:4px solid var(--bleu);}
  .stat.t{border-color:var(--terra);} .stat.v{border-color:var(--vert);} .stat.r{border-color:var(--rouge);} .stat.y{border-color:var(--jaune);}
  .stat .v{font-size:26px; font-weight:800; color:var(--bleu);}
  .stat .l{font-size:12px; color:var(--gris); font-weight:600; text-transform:uppercase; letter-spacing:.4px;}

  /* ===== MESSAGERIE ===== */
  .chat-shell{display:flex; gap:0; height:calc(100vh - 130px); background:#fff; border-radius:14px; overflow:hidden; box-shadow:var(--ombre);}
  .chat-side{width:240px; border-right:1px solid #eee; display:flex; flex-direction:column; flex-shrink:0;}
  .chat-side .sec{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--gris); padding:14px 16px 6px;}
  .chan{display:flex; align-items:center; gap:9px; padding:9px 16px; cursor:pointer; font-size:14px; font-weight:600; color:var(--anthra);}
  .chan:hover{background:var(--creme);}
  .chan.active{background:#E8EEF5; color:var(--bleu); border-right:3px solid var(--terra);}
  .chan .badge{margin-left:auto; background:var(--terra); color:#fff; font-size:10px; font-weight:700; padding:1px 7px; border-radius:20px;}
  .chat-main{flex:1; display:flex; flex-direction:column; min-width:0;}
  .chat-head{padding:13px 18px; border-bottom:1px solid #eee; font-weight:700; color:var(--bleu); display:flex; align-items:center; gap:10px;}
  .chat-body{flex:1; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:10px; background:#FBFAF6;}
  .msg{max-width:76%; display:flex; gap:9px;}
  .msg .bubble{background:#fff; border:1px solid #ECE7DA; border-radius:12px; padding:8px 12px;}
  .msg .who{font-size:12px; font-weight:700; color:var(--terra); margin-bottom:2px;}
  .msg .txt{font-size:14px; white-space:pre-wrap; word-break:break-word;}
  .msg .tm{font-size:10px; color:var(--gris2); margin-top:3px; text-align:right;}
  .msg.mine{align-self:flex-end; flex-direction:row-reverse;}
  .msg.mine .bubble{background:#0F2A4A; color:#fff; border-color:#0F2A4A;}
  .msg.mine .who{color:#9FC2E8;}
  .chat-input{display:flex; gap:8px; padding:12px 16px; border-top:1px solid #eee; background:#fff;}
  .chat-input textarea{flex:1; min-height:42px; max-height:120px; border-radius:22px; padding:10px 16px; resize:none;}

  /* ===== KANBAN ===== */
  .kanban{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .kcol{background:#F0ECE0; border-radius:12px; padding:12px; min-height:160px;}
  .kcol h4{font-size:13px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; display:flex; align-items:center; gap:8px;}
  .kcol h4 .ct{margin-left:auto; background:#fff; color:var(--gris); border-radius:20px; padding:0 9px; font-size:12px;}
  .kcard{background:#fff; border-radius:10px; padding:11px 12px; box-shadow:var(--ombre); margin-bottom:9px; cursor:grab; border-left:3px solid var(--gris2);}
  .kcard.high{border-left-color:var(--rouge);} .kcard.med{border-left-color:var(--jaune);} .kcard.low{border-left-color:var(--gris2);}
  .kcard.dragging{opacity:.5;}
  .kcard .ti{font-weight:700; font-size:13.5px; margin-bottom:5px;}
  .kcard .me{font-size:12px; color:var(--gris); display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .kcard .due{font-size:11px; font-weight:700;}
  .kcard .due.late{color:var(--rouge);} .kcard .due.soon{color:var(--jaune);}
  .kcol.drop-hover{outline:2px dashed var(--terra); outline-offset:-4px;}

  /* table */
  .tablewrap{overflow-x:auto;}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; padding:9px 10px; border-bottom:2px solid #eee; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--gris);}
  td{padding:9px 10px; border-bottom:1px solid #f1ede2;}
  th.num,td.num{text-align:right;}

  /* progress */
  .prog{height:10px; background:#E8E2D4; border-radius:20px; overflow:hidden;}
  .prog > i{display:block; height:100%; background:linear-gradient(90deg,#2E6B3E,#3E8B52); border-radius:20px;}
  .prog.warn > i{background:linear-gradient(90deg,#C9962B,#E0B040);}
  .prog.bad > i{background:linear-gradient(90deg,#A33B3B,#C85E2D);}

  /* modal */
  #modal:empty{display:none;}
  .modalbg{position:fixed; inset:0; background:rgba(15,42,74,.5); display:flex; align-items:center; justify-content:center; z-index:100; padding:16px;}
  .modal{background:#fff; border-radius:16px; padding:22px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; box-shadow:var(--ombre2);}
  .modal h3{color:var(--bleu); font-size:17px;}
  .x{background:none; border:none; font-size:24px; cursor:pointer; color:var(--gris); line-height:1;}

  /* toast */
  #toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--bleu); color:#fff; padding:12px 22px; border-radius:10px; font-weight:600; z-index:200; display:none; box-shadow:var(--ombre2); font-size:14px;}

  .notif-item{display:flex; gap:11px; padding:11px 0; border-bottom:1px solid #f1ede2; align-items:flex-start;}
  .notif-item .ic{font-size:18px; width:26px; text-align:center; flex-shrink:0;}
  .notif-item .tx{flex:1; font-size:13.5px;}
  .notif-item .tx b{color:var(--bleu);}
  .notif-item.urgent .ic{color:var(--rouge);}
  .sound-toggle{display:flex;align-items:center;gap:8px;width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#C9D4E2;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:10px;}
  .sound-toggle:hover{background:rgba(255,255,255,.12);}
  .icon-btn{position:relative;background:none;border:none;cursor:pointer;color:var(--bleu);padding:6px;border-radius:8px;display:flex;align-items:center;}
  .icon-btn:hover{background:var(--creme);}
  .ibadge{position:absolute;top:0;right:0;background:var(--terra);color:#fff;font-size:10px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
  /* reply preview + message actions (style Outlook) */
  .reply-preview{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#EDF2F8;border-left:3px solid var(--terra);border-radius:8px;margin:0 16px 8px;font-size:12.5px;}
  .reply-preview .rp-txt{flex:1;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .reply-preview .rp-x{cursor:pointer;color:var(--gris);}
  .msg{position:relative;}
  .msg .actions{position:absolute;top:-10px;${''}display:none;gap:2px;background:#fff;border:1px solid #e5e0d2;border-radius:18px;padding:2px;box-shadow:var(--ombre);}
  .msg:hover .actions{display:flex;}
  .msg.mine .actions{right:42px;} .msg:not(.mine) .actions{left:42px;}
  .msg .actions button{background:none;border:none;cursor:pointer;color:var(--gris);padding:4px 6px;border-radius:50%;}
  .msg .actions button:hover{background:var(--creme);color:var(--bleu);}
  .msg .quoted{font-size:12px;border-left:2px solid currentColor;opacity:.75;padding:2px 8px;margin-bottom:4px;}
  .msg.recalled .txt{font-style:italic;opacity:.6;}
  /* salle de réunion */
  .meet-hero{background:linear-gradient(135deg,#0F2A4A,#26517f);color:#fff;border-radius:14px;padding:26px;margin-bottom:16px;}
  .meet-frame{width:100%;height:calc(100vh - 220px);min-height:420px;border:none;border-radius:14px;overflow:hidden;background:#000;}
  .meet-card{background:#fff;border-radius:12px;padding:16px;box-shadow:var(--ombre);display:flex;align-items:center;gap:14px;cursor:pointer;border:1px solid #efe9db;transition:.15s;}
  .meet-card:hover{box-shadow:var(--ombre2);transform:translateY(-2px);}
  .meet-ic{width:48px;height:48px;border-radius:12px;background:var(--creme);color:var(--bleu);display:flex;align-items:center;justify-content:center;flex-shrink:0;}

  @media(max-width:860px){
    .sidebar{transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .main{margin-left:0;}
    .topbar .menu-btn{display:block;}
    .g2,.g3,.g4{grid-template-columns:1fr 1fr;}
    .kanban{grid-template-columns:1fr; }
    .chat-shell{flex-direction:column; height:auto;}
    .chat-side{width:100%; flex-direction:row; overflow-x:auto; border-right:none; border-bottom:1px solid #eee;}
    .chat-body{height:50vh;}
  }
  @media(max-width:520px){ .g2,.g3,.g4{grid-template-columns:1fr;} }
</style>

<body>
<div id="root"></div>
<div id="modal"></div>
<div id="toast"></div>
<script>
/* ============================================================
   DISTRIVIA WORKSPACE — communication & collaboration interne
   Partage le même Firebase que Gestion (comptes employés communs).
   Données workspace dans des collections séparées : ws_*
   ============================================================ */

/* >>> Même configuration Firebase que Gestion <<< */
const firebaseConfig = {
  apiKey: "AIzaSyCcl7rBRT1jiDwVR30_1dUND9HCKkq8sgg",
  authDomain: "distrivia-group.firebaseapp.com",
  projectId: "distrivia-group",
  storageBucket: "distrivia-group.firebasestorage.app",
  messagingSenderId: "379306867104",
  appId: "1:379306867104:web:08d849ee32095d67a88cc5"
};
const FB_OK = !!(firebaseConfig.apiKey && firebaseConfig.projectId);
let fdb = null, fauth = null;
if(FB_OK){
  try{
    firebase.initializeApp(firebaseConfig);
    fdb = firebase.firestore();
    fauth = firebase.auth();
    if(fauth) fauth.signInAnonymously().catch(e=>console.warn("Auth anonyme:", e && e.code));
  }catch(e){ console.error("Firebase init:", e); }
}
let fbReadyP = null;
function fbReady(){
  if(!FB_OK) return Promise.reject("non configuré");
  if(fbReadyP) return fbReadyP;
  fbReadyP = new Promise((resolve)=>{
    let done=false; const ok=()=>{ if(!done){done=true; resolve();} };
    if(fauth){ fauth.onAuthStateChanged(u=>{ if(u) ok(); }); setTimeout(ok, 2500); }
    else ok();
  });
  return fbReadyP;
}

/* ============ Helpers ============ */
const el = id => document.getElementById(id);
const esc = s => String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const today = () => new Date().toISOString().slice(0,10);
const nowISO = () => new Date().toISOString();
const uid = () => "w"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function toast(m){ const t=el("toast"); t.textContent=m; t.style.display="block"; clearTimeout(t._t); t._t=setTimeout(()=>t.style.display="none",2600); }
function initials(name){ return (name||"?").trim().split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase(); }
function frDate(d){ if(!d) return ""; const p=String(d).slice(0,10).split("-"); return p.length===3?p[2]+"/"+p[1]+"/"+p[0]:d; }
function timeAgo(iso){
  if(!iso) return "";
  const s=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(s<60) return "à l'instant";
  if(s<3600) return Math.floor(s/60)+" min";
  if(s<86400) return Math.floor(s/3600)+" h";
  if(s<604800) return Math.floor(s/86400)+" j";
  return frDate(iso);
}
function clockHM(iso){ const d=new Date(iso); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
async function sha256(txt){
  if(window.crypto && crypto.subtle){
    const buf=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  let h=0; for(let i=0;i<txt.length;i++){ h=(h*31+txt.charCodeAt(i))|0; } return "x"+(h>>>0).toString(16);
}

/* ============ État applicatif ============ */
let session = null;          // { userId, name, role }
let gestionState = null;      // blob Gestion (users, products, orders, clients…)
let users = [];               // S.users de Gestion (comptes employés)
let view = "home";
let sbOpen = false;

// caches temps réel des collections workspace
let wsMessages = [];          // tous les messages (filtrés par canal à l'affichage)
let wsTasks = [];
let wsApprovals = [];
let wsAnnouncements = [];
let wsLeave = [];
let wsObjectives = [];
let wsPresence = {};          // {userId: lastSeenISO}
let webThreads = [];          // portal_threads : messages/réclamations des clients
let soundOn = (function(){ try{ return localStorage.getItem("distrivia-ws-sound")!=="0"; }catch(e){ return true; } })();
let activeClientThread = null;
let replyTo = null;           // message auquel on répond (style Outlook)
let currentChannel = "general";
const CHANNELS = [
  {id:"general", name:"général"},
  {id:"logistique", name:"logistique"},
  {id:"ventes", name:"ventes"},
  {id:"compta", name:"comptabilité"},
  {id:"direction", name:"direction"},
];
// Icônes SVG monochromes (look corporate, sans emoji)
function icon(name, size){
  const s=size||18;
  const P={

/* ============ Couche données Firebase ============ */
// Lit le blob Gestion (comptes employés + données métier pour les notifications)
async function loadGestion(){
  if(!FB_OK) return;
  await fbReady();
  const snap = await fdb.collection("distrivia").doc("etat").get();
  if(snap.exists){
    try{ gestionState = JSON.parse(snap.data().blob||"{}"); users = gestionState.users||[]; }catch(e){ console.warn("blob:",e); }
  }
}
// Écoute temps réel d'une collection ws_*
function listenWs(coll, cb){
  if(!FB_OK) return ()=>{};
  return fdb.collection(coll).onSnapshot(snap=>{
    cb(snap.docs.map(d=>({ _id:d.id, ...d.data() })));
  }, err=>console.warn("listen "+coll+":", err && err.code));
}
async function wsAdd(coll, row){ if(!FB_OK) return; await fbReady(); await fdb.collection(coll).doc(row.id).set(row); }
async function wsUpdate(coll, id, patch){ if(!FB_OK) return; await fbReady(); await fdb.collection(coll).doc(id).update(patch); }
async function wsDelete(coll, id){ if(!FB_OK) return; await fbReady(); await fdb.collection(coll).doc(id).delete(); }

// présence : signale que je suis en ligne (heartbeat)
let presenceTimer = null;
async function beat(){
  if(!FB_OK || !session) return;
  try{ await fdb.collection("ws_presence").doc(String(session.userId)).set({ userId:session.userId, name:session.name, at:nowISO() }); }catch(e){}
}
function startPresence(){ beat(); clearInterval(presenceTimer); presenceTimer=setInterval(beat, 60000); }

// Attache tous les listeners temps réel après connexion
let listenersAttached = false;
function attachListeners(){
  if(listenersAttached || !FB_OK) return; listenersAttached = true;
  let firstMsgs=true;
  listenWs("ws_messages", rows=>{
    const prevIds=new Set(wsMessages.map(m=>m._id));
    const incoming = rows.filter(m=>!prevIds.has(m._id) && m.from!==session.userId);
    wsMessages=rows;
    if(!firstMsgs && incoming.length){ notifySound(); }
    firstMsgs=false;
    if(view==="messages") renderChatBody(); updateBadges();
  });
  listenWs("ws_tasks", rows=>{ wsTasks=rows; if(view==="tasks"||view==="home") renderMain(); updateBadges(); });
  listenWs("ws_approvals", rows=>{ wsApprovals=rows; if(view==="approvals"||view==="home") renderMain(); updateBadges(); });
  listenWs("ws_announcements", rows=>{ wsAnnouncements=rows; if(view==="announcements"||view==="home"||view==="meeting") renderMain(); updateBadges(); });
  listenWs("ws_leave", rows=>{ wsLeave=rows; if(view==="leave"||view==="home") renderMain(); updateBadges(); });
  listenWs("ws_objectives", rows=>{ wsObjectives=rows; if(view==="objectives"||view==="home") renderMain(); });
  listenWs("ws_presence", rows=>{ wsPresence={}; rows.forEach(r=>wsPresence[r.userId]=r.at); if(view==="team"||view==="messages") renderMain(); });
  // Messages / réclamations clients venant du portail (portal_threads)
  let firstThreads=true;
  listenWs("portal_threads", rows=>{
    const prevUnread = webThreads.reduce((a,t)=>a+(t.unreadForAdmin?1:0),0);
    webThreads=rows;
    const newUnread = webThreads.reduce((a,t)=>a+(t.unreadForAdmin?1:0),0);
    if(!firstThreads && newUnread>prevUnread){ notifySound(); }
    firstThreads=false;
    if(view==="clients"||view==="home") renderMain();
    updateBadges();
  });
}

let _audioCtx=null;
function playBeep(){
  try{
    _audioCtx = _audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const ctx=_audioCtx, t=ctx.currentTime;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type="sine"; o.frequency.setValueAtTime(880,t); o.frequency.setValueAtTime(660,t+0.12);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.32);
    o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.34);
  }catch(e){}
}
function notifySound(){ if(soundOn) playBeep(); }

function bindLogin(){
  const go = async ()=>{
    const login=el("lg-login").value.trim().toLowerCase(), pass=el("lg-pass").value;
    if(!login||!pass){ el("lg-fb").innerHTML=`<div class="err">Identifiant et mot de passe requis.</div>`; return; }

      if(u.active===false){ el("lg-fb").innerHTML=`<div class="err">Compte désactivé — voir l'administrateur.</div>`; return; }
      const h = await sha256((u.salt||"")+pass);
      if(h!==u.hash){ el("lg-fb").innerHTML=`<div class="err">Mot de passe incorrect.</div>`; return; }
      session = { userId:u.id, name:u.name, role:u.role, login:u.login };

      view="home"; afterLogin();

  };

  el("lg-pass").onkeydown = e=>{ if(e.key==="Enter") go(); };
}

}

/* ============ NOTIFICATIONS AUTO (depuis les données Gestion) ============ */
function computeNotifications(){
  const out=[];
  const S = gestionState||{};
  // stock bas
  (S.products||[]).forEach(p=>{ if(p.stock<=(p.alert||0)){ out.push({ic:icon("box",18), urgent:p.stock<=0, txt:`Stock ${p.stock<=0?"épuisé":"bas"} : <b>${esc(p.name)}</b> (${p.stock} en stock)`, go:"notifications"}); } });
  // commandes web en attente
  // (les commandes web vivent dans portal_orders, pas dans le blob — on compte via Gestion si présent)
  // factures impayées anciennes (>15 j)
  (S.orders||[]).forEach(o=>{
    if(o.status==="cancelled"||!o.invoiceNum) return;
    const paid=(o.payments||[]).reduce((a,p)=>a+p.amount,0);
    const total=(o.lines||[]).reduce((a,l)=>a+l.qty*l.price,0);
    if(total-paid>0 && o.date){
      const days=Math.floor((Date.now()-new Date(o.date).getTime())/86400000);
      if(days>=15) out.push({ic:icon("money",18), urgent:days>=30, txt:`Facture <b>${esc(o.invoiceNum)}</b> impayée depuis ${days} j — reste ${(total-paid).toLocaleString("fr-FR").replace(/[\s\u202f\u00a0]/g," ")} F`, go:"notifications"});
    }
  });
  // tâches en retard qui me concernent
  wsTasks.forEach(tk=>{
    if(tk.status!=="done" && tk.due && tk.due<today()){
      out.push({ic:icon("clock",18), urgent:true, txt:`Tâche en retard : <b>${esc(tk.title)}</b> (${userName(tk.assignee)})`, go:"tasks"});
    }
  });
  return out;
}

function unreadCount(){
  // messages non lus = messages des canaux + DM postérieurs à mon dernier passage (simplifié : non émis par moi aujourd'hui)
  const last = (function(){ try{ return JSON.parse(localStorage.getItem("distrivia-ws-read")||"{}"); }catch(e){ return {}; } })();
  let n=0;
  wsMessages.forEach(m=>{
    const key = m.channel || ("dm:"+[m.from,m.to].sort().join("-"));
    const seen = last[key]||0;
    if(m.from!==session.userId && new Date(m.created).getTime()>seen) n++;
  });
  return n;
}

function currentThreadKey(){ return dmWith ? ("dm:"+[session.userId,dmWith].sort().join("-")) : ("chan:"+currentChannel); }
function threadMessages(){
  if(dmWith){ return wsMessages.filter(m=> m.type==="dm" && ((m.from===session.userId&&m.to===dmWith)||(m.from===dmWith&&m.to===session.userId))); }
  return wsMessages.filter(m=> m.channel===currentChannel);
}
function chanUnread(chId){
  const last=getRead("chan:"+chId);
  return wsMessages.filter(m=>m.channel===chId && m.from!==session.userId && new Date(m.created).getTime()>last).length;
}
function dmUnread(uId){
  const last=getRead("dm:"+[session.userId,uId].sort().join("-"));
  return wsMessages.filter(m=>m.type==="dm" && m.from===uId && m.to===session.userId && new Date(m.created).getTime()>last).length;
}
function getRead(key){ try{ return (JSON.parse(localStorage.getItem("distrivia-ws-read")||"{}"))[key]||0; }catch(e){ return 0; } }
function markRead(key){ try{ const o=JSON.parse(localStorage.getItem("distrivia-ws-read")||"{}"); o[key]=Date.now(); localStorage.setItem("distrivia-ws-read", JSON.stringify(o)); }catch(e){} }
function renderChatHead(){
  const h=el("chat-head"); if(!h) return;
  if(dmWith){ const u=userById(dmWith); const on=(Date.now()-new Date(wsPresence[dmWith]||0).getTime())<180000; h.innerHTML=`<span class="avatar sm">${initials(u?u.name:"?")}</span> ${esc(u?u.name:"")} <span class="dot ${on?'on':'off'}"></span> <span class="muted" style="font-size:12px;font-weight:400">${on?"en ligne":"hors ligne"}</span>`; }
  else { const ch=CHANNELS.find(c=>c.id===currentChannel); h.innerHTML=`<span style="color:var(--gris);font-weight:800;font-size:18px">#</span> <span>${ch.name}</span> <span class="muted" style="font-size:12px;font-weight:400">· canal d'équipe</span>`; }
}
function msgById(id){ return wsMessages.find(m=>m.id===id || m._id===id); }
function renderChatBody(){
  const b=el("chat-body"); if(!b) return;
  const msgs=threadMessages().sort((a,b)=>a.created<b.created?-1:1);
  if(!msgs.length){ b.innerHTML=`<div class="empty">Démarrez la conversation.</div>`; }
  else {
    b.innerHTML = msgs.map(m=>{
      const mine=m.from===session.userId;
      const recalled=m.recalled;
      // citation (réponse à un message)
      let quote="";
      if(m.replyToText){ quote=`<div class="quoted"><b>${esc(m.replyToName||"")}</b> : ${esc((m.replyToText||"").slice(0,90))}${(m.replyToText||"").length>90?"…":""}</div>`; }
      const actions = recalled ? "" : `<div class="actions">
        <button title="Répondre" data-reply="${m.id||m._id}">${icon('reply',14)}</button>
        ${mine?`<button title="Rappeler le message" data-recall="${m.id||m._id}">${icon('recall',14)}</button>`:""}
      </div>`;
      return `<div class="msg ${mine?'mine':''} ${recalled?'recalled':''}">
        ${mine?"":`<div class="avatar sm">${initials(userName(m.from))}</div>`}
        <div class="bubble">${mine?"":`<div class="who">${esc(userName(m.from))}</div>`}${quote}<div class="txt">${recalled?"Message rappelé":esc(m.text)}</div><div class="tm">${m.edited?"modifié · ":""}${clockHM(m.created)}</div></div>
        ${actions}
      </div>`;
    }).join("");
  }
  b.scrollTop=b.scrollHeight;
  // brancher les actions par message
  b.querySelectorAll("[data-reply]").forEach(btn=> btn.onclick=()=>{ replyTo=msgById(btn.dataset.reply); renderReplyZone(); const i=el("msg-input"); if(i) i.focus(); });
  b.querySelectorAll("[data-recall]").forEach(btn=> btn.onclick=()=> recallMessage(btn.dataset.recall));
  markRead(currentThreadKey()); updateBadges();
}
function renderReplyZone(){
  const z=el("reply-zone"); if(!z) return;
  if(!replyTo){ z.innerHTML=""; return; }
  z.innerHTML=`<div class="reply-preview">${icon('reply',14)}<div class="rp-txt">Réponse à <b>${esc(userName(replyTo.from))}</b> : ${esc((replyTo.text||"").slice(0,70))}</div><span class="rp-x" id="rp-cancel">${icon('x',16)}</span></div>`;
  const x=el("rp-cancel"); if(x) x.onclick=()=>{ replyTo=null; renderReplyZone(); };
}
async function recallMessage(id){
  const m=msgById(id); if(!m) return;
  confirmDialog("Rappeler ce message ? Il sera remplacé par « Message rappelé » pour tout le monde (style Outlook).", async ()=>{
    await wsUpdate("ws_messages", m._id||m.id, { recalled:true, text:"", recalledAt:nowISO() });
    toast("Message rappelé");
  }, {title:"Rappeler le message", ok:"Rappeler", danger:true});
}
function bindMessages(){
  document.querySelectorAll("[data-chan]").forEach(c=> c.onclick=()=>{ dmWith=null; currentChannel=c.dataset.chan; replyTo=null; renderMain(); });
  document.querySelectorAll("[data-dm]").forEach(c=> c.onclick=()=>{ dmWith=+c.dataset.dm; replyTo=null; renderMain(); });
  renderChatHead(); renderChatBody(); renderReplyZone();
  const inp=el("msg-input"), send=el("msg-send");
  const doSend = async ()=>{
    const txt=(inp.value||"").trim(); if(!txt) return;
    inp.value="";
    const base = dmWith
      ? { id:uid(), type:"dm", from:session.userId, to:dmWith, text:txt, created:nowISO() }
      : { id:uid(), type:"chan", channel:currentChannel, from:session.userId, text:txt, created:nowISO() };
    if(replyTo){ base.replyToId=replyTo.id||replyTo._id; base.replyToText=replyTo.text||""; base.replyToName=userName(replyTo.from); }

    try{ await wsAdd("ws_messages", base); }catch(e){ toast("Échec d'envoi"); inp.value=txt; }
  };
  if(send) send.onclick=doSend;
  if(inp) inp.onkeydown=e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); doSend(); } };

/* Résout le nom du client d'un thread (le portail stocke party_name) */
function threadName(t){
  if(!t) return "Client";
  let n = t.party_name || t.client_name || t.clientName || t.name || "";
  if(!n && t.party_id && gestionState && gestionState.clients){
    const c = gestionState.clients.find(c=> String(c.id)===String(t.party_id));
    if(c) n = c.name;
  }
  if(!n && (t.party_email||t.client_email) && gestionState && gestionState.clients){
    const em=(t.party_email||t.client_email).toLowerCase();
    const c = gestionState.clients.find(c=> c.email && c.email.toLowerCase()===em);
    if(c) n = c.name;
  }
  if(!n){ const em=t.party_email||t.client_email; if(em) n = em.split("@")[0]; }
  return n || "Client";
}

function taskCard(tk){
  const late = tk.status!=="done" && tk.due && tk.due<today();
  const soon = tk.status!=="done" && tk.due && !late && tk.due<=new Date(Date.now()+2*86400000).toISOString().slice(0,10);
  return `<div class="kcard ${tk.priority||'low'}" draggable="true" data-task="${tk._id}">
    <div class="ti">${esc(tk.title)}</div>
    <div class="me">
      <span class="avatar sm" title="${esc(userName(tk.assignee))}">${initials(userName(tk.assignee))}</span>
      <span class="pill ${tk.priority||'low'}">${prioLabel(tk.priority)}</span>
      ${tk.due?`<span class="due ${late?'late':soon?'soon':''}">${late?'⏰ ':''}${frDate(tk.due)}</span>`:""}
      ${tk.linkOrder?`<span class="muted" style="font-size:11px">${icon("box",12)} ${esc(tk.linkOrder)}</span>`:""}
    </div>

}
function taskDialog(tk){
  const opts = users.filter(u=>u.active!==false).map(u=>`<option value="${u.id}" ${tk&&tk.assignee===u.id?"selected":""}>${esc(u.name)}</option>`).join("");
  openModal(`<div class="row" style="justify-content:space-between"><h3>${tk?"Modifier la tâche":"Nouvelle tâche"}</h3><button class="x" onclick="closeModal()">×</button></div>
    <label>Titre</label><input id="tk-title" value="${tk?esc(tk.title):""}" placeholder="Ex. Préparer la livraison CMD-0042">
    <label>Description (facultatif)</label><textarea id="tk-desc" placeholder="Détails…">${tk?esc(tk.desc||""):""}</textarea>
    <div class="grid g2">
      <div><label>Assigné à</label><select id="tk-assignee">${opts}</select></div>
      <div><label>Priorité</label><select id="tk-prio"><option value="low" ${!tk||tk.priority==="low"?"selected":""}>Normal</option><option value="med" ${tk&&tk.priority==="med"?"selected":""}>Moyen</option><option value="high" ${tk&&tk.priority==="high"?"selected":""}>Urgent</option></select></div>
      <div><label>Échéance</label><input type="date" id="tk-due" value="${tk?tk.due||"":""}"></div>
      <div><label>Lien commande (facultatif)</label><input id="tk-link" value="${tk?esc(tk.linkOrder||""):""}" placeholder="Ex. CMD-0042"></div>
    </div>
    <div class="row" style="justify-content:space-between;margin-top:16px">
      ${tk?`<button class="btn r sm" id="tk-del">Supprimer</button>`:"<span></span>"}
      <button class="btn" id="tk-save">${tk?"Enregistrer":"Créer la tâche"}</button>
    </div>`);
  el("tk-save").onclick=async ()=>{
    const title=el("tk-title").value.trim(); if(!title) return toast("Titre requis");
    const data={ title, desc:el("tk-desc").value.trim(), assignee:+el("tk-assignee").value, priority:el("tk-prio").value, due:el("tk-due").value||"", linkOrder:el("tk-link").value.trim() };
    if(tk){ await wsUpdate("ws_tasks", tk._id, data); toast("Tâche mise à jour ✓"); }
    else { await wsAdd("ws_tasks", { id:uid(), ...data, status:"todo", creator:session.userId, created:nowISO() }); toast("Tâche créée ✓"); }
    closeModal();
  };
  if(tk){ el("tk-del").onclick=()=> confirmDialog("Supprimer cette tâche ?", async ()=>{ await wsDelete("ws_tasks", tk._id); closeModal(); toast("Tâche supprimée"); }, {danger:true, ok:"Supprimer"}); }
}
function bindTasks(){
  document.querySelectorAll("[data-tf]").forEach(b=> b.onclick=()=>{ taskFilter=b.dataset.tf; renderMain(); });
  const nw=el("task-new"); if(nw) nw.onclick=()=>taskDialog(null);
  document.querySelectorAll("[data-task]").forEach(card=>{
    card.onclick=(e)=>{ if(card._dragging) return; const tk=wsTasks.find(t=>t._id===card.dataset.task); if(tk) taskDialog(tk); };
    card.addEventListener("dragstart",e=>{ card._dragging=true; card.classList.add("dragging"); e.dataTransfer.setData("text/plain", card.dataset.task); });
    card.addEventListener("dragend",e=>{ setTimeout(()=>card._dragging=false,50); card.classList.remove("dragging"); });
  });
  document.querySelectorAll("[data-col]").forEach(col=>{
    col.addEventListener("dragover",e=>{ e.preventDefault(); col.classList.add("drop-hover"); });
    col.addEventListener("dragleave",e=>{ col.classList.remove("drop-hover"); });
    col.addEventListener("drop", async e=>{
      e.preventDefault(); col.classList.remove("drop-hover");
      const id=e.dataTransfer.getData("text/plain"); const tk=wsTasks.find(t=>t._id===id);
      if(tk && tk.status!==col.dataset.col){ await wsUpdate("ws_tasks", id, {status:col.dataset.col, ...(col.dataset.col==="done"?{doneAt:nowISO(), doneBy:session.userId}:{})}); toast("Statut mis à jour ✓"); }
    });
  });
}

/* ============ VALIDATIONS ============ */
let apprFilter="pending";
function vApprovals(){
  const mine = wsApprovals.filter(a=> apprFilter==="pending" ? a.status==="pending" : apprFilter==="mine" ? a.requester===session.userId : true)
    .sort((a,b)=>a.created<b.created?1:-1);
  return `
  <div class="row" style="justify-content:space-between;margin-bottom:14px">
    <div class="row">
      <button class="btn sm ${apprFilter==='pending'?'':'ghost'}" data-af="pending">En attente (${wsApprovals.filter(a=>a.status==="pending").length})</button>
      <button class="btn sm ${apprFilter==='mine'?'':'ghost'}" data-af="mine">Mes demandes</button>
      <button class="btn sm ${apprFilter==='all'?'':'ghost'}" data-af="all">Tout</button>
    </div>
    <button class="btn b" id="appr-new">+ Demander une validation</button>
  </div>
  <div class="panel">
    ${mine.length? `<div class="tablewrap"><table>
      <tr><th>Objet</th><th>Type</th><th>Demandeur</th><th>Validateur</th><th>Statut</th><th>Date</th><th></th></tr>
      ${mine.map(a=>`<tr>
        <td><b>${esc(a.title)}</b>${a.amount?`<div class="muted" style="font-size:11px">${(+a.amount).toLocaleString("fr-FR").replace(/[\s\u202f\u00a0]/g," ")} F</div>`:""}${a.note?`<div class="muted" style="font-size:11px">${esc(a.note)}</div>`:""}</td>
        <td class="muted">${esc(apprType(a.kind))}</td>
        <td>${esc(userName(a.requester))}</td>
        <td>${a.approver?esc(userName(a.approver)):'<span class="muted">tout admin</span>'}</td>
        <td><span class="pill ${a.status}">${apprStatus(a.status)}</span>${a.decidedBy?`<div class="muted" style="font-size:11px">par ${esc(userName(a.decidedBy))}</div>`:""}${a.decisionNote?`<div class="muted" style="font-size:11px">"${esc(a.decisionNote)}"</div>`:""}</td>
        <td class="muted">${timeAgo(a.created)}</td>
        <td>${a.status==="pending"&&(isAdmin()||a.approver===session.userId)?`<div class="row"><button class="btn v sm" data-aok="${a._id}">${icon("check",14)}</button><button class="btn r sm" data-ano="${a._id}">${icon("x",14)}</button></div>`:""}</td>
      </tr>`).join("")}
    </table></div>` : `<p class="empty">Aucune validation ${apprFilter==='pending'?'en attente':''}.</p>`}
  </div>`;
}
function apprType(k){ return {expense:"Dépense",discount:"Remise client",refund:"Avoir / remboursement",purchase:"Achat fournisseur",other:"Autre"}[k]||"Autre"; }
function apprStatus(s){ return {pending:"En attente",approved:"Approuvé",rejected:"Refusé"}[s]||s; }
function approvalDialog(){
  const opts = users.filter(u=>u.active!==false && u.id!==session.userId).map(u=>`<option value="${u.id}">${esc(u.name)}${u.role==="admin"?" (admin)":""}</option>`).join("");
  openModal(`<div class="row" style="justify-content:space-between"><h3>Demander une validation</h3><button class="x" onclick="closeModal()">×</button></div>
    <label>Objet</label><input id="ap-title" placeholder="Ex. Remise 10% pour Resto Teranga">
    <div class="grid g2">
      <div><label>Type</label><select id="ap-kind"><option value="expense">Dépense</option><option value="discount">Remise client</option><option value="refund">Avoir / remboursement</option><option value="purchase">Achat fournisseur</option><option value="other">Autre</option></select></div>
      <div><label>Montant (facultatif)</label><input id="ap-amount" type="number" min="0" placeholder="FCFA"></div>
    </div>
    <label>Validateur (facultatif — sinon tout admin)</label><select id="ap-approver"><option value="">Tout administrateur</option>${opts}</select>
    <label>Note / justification</label><textarea id="ap-note" placeholder="Pourquoi cette demande…"></textarea>
    <div class="row" style="justify-content:flex-end;margin-top:16px"><button class="btn" id="ap-save">Envoyer la demande</button></div>`);
  el("ap-save").onclick=async ()=>{
    const title=el("ap-title").value.trim(); if(!title) return toast("Objet requis");
    await wsAdd("ws_approvals", { id:uid(), title, kind:el("ap-kind").value, amount:+el("ap-amount").value||0, approver:el("ap-approver").value?+el("ap-approver").value:null, note:el("ap-note").value.trim(), requester:session.userId, status:"pending", created:nowISO() });
    closeModal(); toast("Demande de validation envoyée ✓");
  };
}
async function decideApproval(id, decision){
  const a = wsApprovals.find(x=>x._id===id); if(!a) return;
  if(decision==="rejected"){
    openModal(`<h3>Refuser la demande</h3><p class="muted" style="margin:8px 0">"${esc(a.title)}"</p><label>Motif (facultatif)</label><input id="dec-note" placeholder="Raison du refus…">
      <div class="row" style="justify-content:flex-end;margin-top:14px"><button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn r" id="dec-ok">Refuser</button></div>`);
    el("dec-ok").onclick=async ()=>{ await wsUpdate("ws_approvals", id, {status:"rejected", decidedBy:session.userId, decisionNote:el("dec-note").value.trim(), decidedAt:nowISO()}); closeModal(); toast("Demande refusée"); };
  } else {
    await wsUpdate("ws_approvals", id, {status:"approved", decidedBy:session.userId, decidedAt:nowISO()}); toast("Demande approuvée ✓");
  }
}
window.decideApproval=decideApproval;
function bindApprovals(){
  document.querySelectorAll("[data-af]").forEach(b=> b.onclick=()=>{ apprFilter=b.dataset.af; renderMain(); });
  const nw=el("appr-new"); if(nw) nw.onclick=approvalDialog;
  document.querySelectorAll("[data-aok]").forEach(b=> b.onclick=()=>decideApproval(b.dataset.aok,"approved"));
  document.querySelectorAll("[data-ano]").forEach(b=> b.onclick=()=>decideApproval(b.dataset.ano,"rejected"));
}

/* ============ ANNONCES ============ */
function vAnnouncements(){
  const list=wsAnnouncements.filter(a=>a.type!=="meeting").sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)||(b.created<a.created?-1:1));
  return `
  ${isAdmin()?`<div class="row" style="justify-content:flex-end;margin-bottom:14px"><button class="btn b" id="ann-new">+ Nouvelle annonce</button></div>`:""}
  ${list.length? list.map(a=>`<div class="panel" style="${a.pinned?'border-left:4px solid var(--terra)':''}">
    <div class="row" style="justify-content:space-between;align-items:flex-start">
      <h3 style="margin:0">${a.pinned?icon("pin",15)+" ":icon("megaphone",15)+" "}${esc(a.title)}</h3>
      ${isAdmin()?`<div class="row"><button class="btn ghost sm" data-annpin="${a._id}">${a.pinned?"Désépingler":"Épingler"}</button><button class="btn r sm" data-anndel="${a._id}">${icon("x",14)}</button></div>`:""}
    </div>
    <p style="margin:8px 0;white-space:pre-wrap;color:#333">${esc(a.body||"")}</p>
    <div class="muted" style="font-size:12px">${esc(userName(a.author))} · ${timeAgo(a.created)}</div>
  </div>`).join("") : `<div class="panel"><p class="empty">Aucune annonce pour le moment.</p></div>`}`;
}
function announcementDialog(){
  openModal(`<div class="row" style="justify-content:space-between"><h3>Nouvelle annonce</h3><button class="x" onclick="closeModal()">×</button></div>
    <label>Titre</label><input id="an-title" placeholder="Ex. Objectifs du mois de juillet">
    <label>Message</label><textarea id="an-body" rows="5" placeholder="Votre annonce à toute l'équipe…"></textarea>
    <label style="display:flex;align-items:center;gap:8px;text-transform:none"><input type="checkbox" id="an-pin" style="width:auto"> Épingler en haut</label>
    <div class="row" style="justify-content:flex-end;margin-top:14px"><button class="btn" id="an-save">Publier</button></div>`);
  el("an-save").onclick=async ()=>{
    const title=el("an-title").value.trim(); if(!title) return toast("Titre requis");
    await wsAdd("ws_announcements", { id:uid(), title, body:el("an-body").value.trim(), pinned:el("an-pin").checked, author:session.userId, created:nowISO() });
    closeModal(); toast("Annonce publiée ✓");
  };
}
function bindAnnouncements(){
  const nw=el("ann-new"); if(nw) nw.onclick=announcementDialog;
  document.querySelectorAll("[data-annpin]").forEach(b=> b.onclick=async ()=>{ const a=wsAnnouncements.find(x=>x._id===b.dataset.annpin); await wsUpdate("ws_announcements", b.dataset.annpin, {pinned:!a.pinned}); });
  document.querySelectorAll("[data-anndel]").forEach(b=> b.onclick=()=> confirmDialog("Supprimer cette annonce ?", async ()=>{ await wsDelete("ws_announcements", b.dataset.anndel); toast("Annonce supprimée"); }, {danger:true, ok:"Supprimer"}));
}

/* ============ OBJECTIFS ============ */
function vObjectives(){
  const list=wsObjectives.filter(o=>o.active!==false);
  return `
  ${isAdmin()?`<div class="row" style="justify-content:flex-end;margin-bottom:14px"><button class="btn b" id="obj-new">+ Nouvel objectif</button></div>`:""}
  <div class="grid g2">
  ${list.length? list.map(o=>{ const pct=o.target>0?Math.min(100,Math.round(o.current/o.target*100)):0; const cls=pct>=80?"":pct>=40?"warn":"bad";
    return `<div class="panel">
      <div class="row" style="justify-content:space-between"><h3 style="margin:0">${icon("target",16)} ${esc(o.title)}</h3>${isAdmin()?`<button class="btn ghost sm" data-objedit="${o._id}">Modifier</button>`:""}</div>
      <div style="display:flex;justify-content:space-between;font-size:13px;margin:10px 0 5px"><span class="muted">${(o.current||0).toLocaleString("fr-FR")} / ${(o.target||0).toLocaleString("fr-FR")} ${esc(o.unit||"")}</span><b>${pct}%</b></div>
      <div class="prog ${cls}"><i style="width:${pct}%"></i></div>
      ${o.deadline?`<div class="muted" style="font-size:12px;margin-top:8px">Échéance : ${frDate(o.deadline)}</div>`:""}
    </div>`;
  }).join("") : `<div class="panel"><p class="empty">Aucun objectif défini.</p></div>`}
  </div>`;
}
function objectiveDialog(o){
  openModal(`<div class="row" style="justify-content:space-between"><h3>${o?"Modifier l'objectif":"Nouvel objectif"}</h3><button class="x" onclick="closeModal()">×</button></div>
    <label>Intitulé</label><input id="ob-title" value="${o?esc(o.title):""}" placeholder="Ex. Chiffre d'affaires de juillet">
    <div class="grid g2">
      <div><label>Cible</label><input id="ob-target" type="number" value="${o?o.target||0:""}" placeholder="5000000"></div>
      <div><label>Réalisé actuel</label><input id="ob-current" type="number" value="${o?o.current||0:0}" placeholder="0"></div>
      <div><label>Unité</label><input id="ob-unit" value="${o?esc(o.unit||"FCFA"):"FCFA"}" placeholder="FCFA, commandes…"></div>
      <div><label>Échéance</label><input type="date" id="ob-deadline" value="${o?o.deadline||"":""}"></div>
    </div>
    <div class="row" style="justify-content:space-between;margin-top:16px">${o?`<button class="btn r sm" id="ob-del">Supprimer</button>`:"<span></span>"}<button class="btn" id="ob-save">${o?"Enregistrer":"Créer"}</button></div>`);
  el("ob-save").onclick=async ()=>{
    const title=el("ob-title").value.trim(); if(!title) return toast("Intitulé requis");
    const data={ title, target:+el("ob-target").value||0, current:+el("ob-current").value||0, unit:el("ob-unit").value.trim(), deadline:el("ob-deadline").value||"" };
    if(o){ await wsUpdate("ws_objectives", o._id, data); toast("Objectif mis à jour ✓"); } else { await wsAdd("ws_objectives", { id:uid(), ...data, active:true, created:nowISO() }); toast("Objectif créé ✓"); }
    closeModal();
  };
  if(o){ el("ob-del").onclick=()=> confirmDialog("Supprimer cet objectif ?", async ()=>{ await wsDelete("ws_objectives", o._id); closeModal(); toast("Supprimé"); }, {danger:true, ok:"Supprimer"}); }
}
function bindObjectives(){
  const nw=el("obj-new"); if(nw) nw.onclick=()=>objectiveDialog(null);
  document.querySelectorAll("[data-objedit]").forEach(b=> b.onclick=()=>{ const o=wsObjectives.find(x=>x._id===b.dataset.objedit); objectiveDialog(o); });
}

/* ============ CONGÉS ============ */
function vLeave(){
  const mine=wsLeave.filter(l=>l.user===session.userId).sort((a,b)=>a.created<b.created?1:-1);
  const toReview=isAdmin()?wsLeave.filter(l=>l.status==="pending").sort((a,b)=>a.created<b.created?1:-1):[];
  return `
  <div class="grid g2">
    <div class="panel"><h3>${icon("leave")} Demander un congé</h3>
      <div class="grid g2">
        <div><label>Du</label><input type="date" id="lv-from"></div>
        <div><label>Au</label><input type="date" id="lv-to"></div>
      </div>
      <label>Type</label><select id="lv-type"><option>Congé annuel</option><option>Maladie</option><option>Absence exceptionnelle</option><option>Autre</option></select>
      <label>Motif (facultatif)</label><input id="lv-reason" placeholder="Précisez si besoin…">
      <button class="btn full" style="margin-top:14px" id="lv-send">Envoyer la demande</button>
    </div>
    <div class="panel"><h3>Mes demandes</h3>
      ${mine.length? mine.map(l=>`<div style="padding:9px 0;border-bottom:1px solid #f1ede2;display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-weight:600;font-size:13.5px">${esc(l.type)} · ${frDate(l.from)} → ${frDate(l.to)}</div>${l.reason?`<div class="muted" style="font-size:11px">${esc(l.reason)}</div>`:""}${l.decisionNote?`<div class="muted" style="font-size:11px">"${esc(l.decisionNote)}"</div>`:""}</div>
        <span class="pill ${l.status}">${apprStatus(l.status)}</span>
      </div>`).join("") : `<p class="empty">Aucune demande.</p>`}
    </div>
  </div>
  ${isAdmin()?`<div class="panel"><h3>${icon("approve")} Demandes à traiter (${toReview.length})</h3>
    ${toReview.length? `<div class="tablewrap"><table><tr><th>Employé</th><th>Type</th><th>Période</th><th>Motif</th><th></th></tr>
      ${toReview.map(l=>`<tr><td><b>${esc(userName(l.user))}</b></td><td class="muted">${esc(l.type)}</td><td>${frDate(l.from)} → ${frDate(l.to)}</td><td class="muted">${esc(l.reason||"—")}</td>
        <td><div class="row"><button class="btn v sm" data-lvok="${l._id}">Approuver</button><button class="btn r sm" data-lvno="${l._id}">Refuser</button></div></td></tr>`).join("")}
    </table></div>` : `<p class="empty">Aucune demande en attente.</p>`}
  </div>`:""}`;
}
function bindLeave(){
  const send=el("lv-send"); if(send) send.onclick=async ()=>{
    const from=el("lv-from").value, to=el("lv-to").value;
    if(!from||!to) return toast("Indiquez les dates");
    if(to<from) return toast("La date de fin doit suivre la date de début");
    await wsAdd("ws_leave", { id:uid(), user:session.userId, from, to, type:el("lv-type").value, reason:el("lv-reason").value.trim(), status:"pending", created:nowISO() });
    toast("Demande de congé envoyée ✓"); renderMain();
  };
  document.querySelectorAll("[data-lvok]").forEach(b=> b.onclick=async ()=>{ await wsUpdate("ws_leave", b.dataset.lvok, {status:"approved", decidedBy:session.userId, decidedAt:nowISO()}); toast("Congé approuvé ✓"); });
  document.querySelectorAll("[data-lvno]").forEach(b=> b.onclick=()=>{
    const id=b.dataset.lvno;
    openModal(`<h3>Refuser la demande</h3><label>Motif (facultatif)</label><input id="lvd-note" placeholder="Raison…"><div class="row" style="justify-content:flex-end;margin-top:14px"><button class="btn ghost" onclick="closeModal()">Annuler</button><button class="btn r" id="lvd-ok">Refuser</button></div>`);
    el("lvd-ok").onclick=async ()=>{ await wsUpdate("ws_leave", id, {status:"rejected", decidedBy:session.userId, decisionNote:el("lvd-note").value.trim(), decidedAt:nowISO()}); closeModal(); toast("Demande refusée"); };
  });
}

/* ============ ANNUAIRE ============ */
function vTeam(){
  const online=id=>(Date.now()-new Date(wsPresence[id]||0).getTime())<180000;
  const list=users.filter(u=>u.active!==false);
  return `<div class="grid g3">
    ${list.map(u=>`<div class="panel" style="text-align:center">
      <div class="avatar lg" style="margin:0 auto 10px">${initials(u.name)}</div>
      <div style="font-weight:700">${esc(u.name)} <span class="dot ${online(u.id)?'on':'off'}"></span></div>
      <div class="muted" style="font-size:12px">${u.role==="admin"?"Administrateur":"Employé"}</div>
      <div class="muted" style="font-size:12px">@${esc(u.login||"")}</div>
      <div class="row" style="justify-content:center;margin-top:10px">
        ${u.id!==session.userId?`<button class="btn ghost sm" onclick="openDM(${u.id})">${icon("chat",14)} Message</button>`:`<span class="pill done">C'est vous</span>`}
      </div>
    </div>`).join("")}
  </div>`;
}
function openDM(id){ view="messages"; dmWith=id; render(); }
window.openDM=openDM;

/* ============ NOTIFICATIONS ============ */
function vNotifications(){
  const notifs=computeNotifications();
  return `<div class="panel"><h3>${icon("bell")} Centre de notifications</h3>
    <p class="muted" style="font-size:13px;margin-bottom:12px">Alertes générées automatiquement depuis vos données DISTRIVIA Gestion (stock, factures, tâches).</p>
    ${notifs.length? notifs.map(n=>`<div class="notif-item ${n.urgent?'urgent':''}"><div class="ic">${n.ic}</div><div class="tx">${n.txt}</div>${n.urgent?'<span class="pill high">Urgent</span>':""}</div>`).join("") : `<p class="empty">✅ Tout est sous contrôle, aucune alerte.</p>`}
  </div>
  <p class="muted" style="font-size:12px">Ces alertes se mettent à jour automatiquement. Connectez-vous régulièrement pour rester informé.</p>`;
}

/* ============ BOOT ============ */
(async function boot(){
  render(); // login si pas de session
  if(session && FB_OK){
    try{
      await loadGestion();
      // vérifie que le compte existe toujours
      if(!users.find(u=>u.id===session.userId)){ logout(); return; }
      afterLogin();
    }catch(e){ console.warn("Boot:", e); render(); }
  }
})();
</script>
