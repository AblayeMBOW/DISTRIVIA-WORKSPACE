<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>DISTRIVIA Workspace</title>
<meta name="theme-color" content="#0F2A4A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workspace">
<link rel="apple-touch-icon" href="icon-ws-192.png">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect x='1' y='1' width='62' height='62' rx='14' fill='%23F5F1E8' stroke='%23CFC6B0' stroke-width='2'/%3E%3Ctext x='32' y='42' font-family='Arial,sans-serif' font-size='30' font-weight='bold' fill='%230F2A4A' text-anchor='middle'%3ED%3C/text%3E%3Crect x='18' y='49' width='28' height='4' fill='%23C85E2D'/%3E%3C/svg%3E">
<style>
  :root{
    --bleu:#0F2A4A; --bleu2:#1B3D63; --bleu3:#26517f; --terra:#C85E2D; --terra2:#E0764A; --creme:#F5F1E8;
    --anthra:#1A1A1A; --gris:#888880; --gris2:#B9B9B0; --blanc:#FFFFFF; --vert:#2E6B3E; --vert2:#3E8B52; --rouge:#A33B3B; --jaune:#C9962B;
    --ombre:0 1px 3px rgba(15,42,74,.04), 0 4px 16px rgba(15,42,74,.06); --ombre2:0 12px 40px rgba(15,42,74,.18);
    --radius:16px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Segoe UI', system-ui, -apple-system, sans-serif; background:#EEE9DC; color:var(--anthra); font-size:14.5px; line-height:1.5; -webkit-tap-highlight-color:transparent;}
  body::before{content:""; position:fixed; inset:0; z-index:-1; background:radial-gradient(1200px 600px at 80% -10%, rgba(200,94,45,.06), transparent), radial-gradient(900px 500px at -10% 110%, rgba(27,61,99,.07), transparent);}
  h1,h2,h3,h4{font-family:'Segoe UI', system-ui, sans-serif; letter-spacing:-.2px;}
  a{color:var(--terra); text-decoration:none;}
  input,select,textarea,button{font-family:inherit; font-size:14px;}
  label{display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--gris); margin:10px 0 4px;}
  input:not([type=checkbox]):not([type=radio]),select,textarea{width:100%; padding:10px 13px; border:1px solid #e0d9c8; border-radius:10px; background:#fff; outline:none; transition:.15s;}
  input:focus,select:focus,textarea:focus{border-color:var(--bleu2); box-shadow:0 0 0 3px rgba(27,61,99,.12);}
  textarea{resize:vertical; min-height:70px;}
  .btn{background:var(--bleu); color:#fff; border:none; border-radius:10px; padding:10px 18px; font-weight:700; cursor:pointer; transition:transform .12s, box-shadow .15s, background .15s; display:inline-flex; align-items:center; gap:7px; justify-content:center; box-shadow:0 2px 8px rgba(15,42,74,.18);}
  .btn:hover{background:var(--bleu2); transform:translateY(-1px); box-shadow:0 6px 18px rgba(15,42,74,.25);}
  .btn:active{transform:translateY(0);}
  .btn.b{background:var(--terra); box-shadow:0 2px 8px rgba(200,94,45,.28);} .btn.b:hover{background:var(--terra2); box-shadow:0 6px 18px rgba(200,94,45,.34);}
  .btn.v{background:var(--vert);} .btn.v:hover{background:var(--vert2);}
  .btn.r{background:var(--rouge);}
  .btn.ghost{background:#fff; color:var(--bleu); border:1px solid #e0d9c8; box-shadow:none;}
  .btn.ghost:hover{background:var(--creme); box-shadow:0 2px 8px rgba(15,42,74,.08);}
  .btn.sm{padding:6px 12px; font-size:12.5px; border-radius:8px; box-shadow:none;}
  .btn.full{width:100%;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .muted{color:var(--gris);}
  .pill{display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:700;}
  .pill.todo{background:#EFE9DB; color:#6b6456;}
  .pill.doing{background:#E2EEF6; color:#1B3D63;}
  .pill.done{background:#DCEFE0; color:#2E6B3E;}
  .pill.high{background:#F6E0E0; color:#A33B3B;}
  .pill.med{background:#F6EEDB; color:#9a7016;}
  .pill.low{background:#E8E8E2; color:#777;}
  .pill.pending{background:#F6EEDB; color:#9a7016;}
  .pill.approved{background:#DCEFE0; color:#2E6B3E;}
  .pill.rejected{background:#F6E0E0; color:#A33B3B;}
  .dot{width:9px; height:9px; border-radius:50%; display:inline-block;}
  .dot.on{background:#3E8B52;} .dot.off{background:#C9C9C0;}

  /* ===== LOGIN ===== */
  .login-wrap{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; background:linear-gradient(135deg,#0F2A4A 0%,#1B3D63 100%);}
  .login-card{background:#fff; border-radius:18px; padding:38px 32px; width:100%; max-width:400px; box-shadow:var(--ombre2);}
  .login-logo{text-align:center; margin-bottom:24px;}
  .login-logo .wm{font-size:26px; font-weight:800; letter-spacing:4px; color:var(--bleu);}
  .login-logo .bar{width:64px; height:3px; background:var(--terra); margin:5px auto;}
  .login-logo .sub{font-size:10px; letter-spacing:3px; color:var(--gris); font-weight:600;}
  .login-logo .ws{margin-top:10px; font-size:13px; color:var(--terra); font-weight:700; letter-spacing:1px;}
  .err{background:#FBE9E9; color:#A33B3B; padding:9px 12px; border-radius:8px; font-size:13px; margin-top:10px;}
  .ok{background:#E5F2E8; color:#2E6B3E; padding:9px 12px; border-radius:8px; font-size:13px; margin-top:10px;}

  /* ===== APP SHELL ===== */
  .shell{display:flex; min-height:100vh;}
  .sidebar{width:236px; background:linear-gradient(180deg,#0F2A4A 0%,#12243a 100%); color:#fff; display:flex; flex-direction:column; position:fixed; top:0; bottom:0; left:0; z-index:40; transition:transform .25s; box-shadow:4px 0 24px rgba(0,0,0,.12);}
  .sb-logo{padding:20px 22px 16px; border-bottom:1px solid rgba(255,255,255,.08);}
  .sb-logo .wm{font-size:20px; font-weight:800; letter-spacing:3px;}
  .sb-logo .bar{width:46px; height:3px; background:var(--terra); margin:4px 0; border-radius:2px;}
  .sb-logo .sub{font-size:9px; letter-spacing:2px; color:#9FB2C9; font-weight:600;}
  .sb-nav{padding:10px 12px;}
  .sb-nav button{display:flex; align-items:center; gap:12px; width:100%; background:none; border:none; color:#AEC0D4; font-weight:600; font-size:13.5px; padding:10px 14px; cursor:pointer; text-align:left; position:relative; border-radius:10px; margin-bottom:2px; transition:.15s;}
  .sb-nav button:hover{background:rgba(255,255,255,.08); color:#fff;}
  .sb-nav button.active{background:linear-gradient(90deg,rgba(200,94,45,.22),rgba(200,94,45,.06)); color:#fff;}
  .sb-nav button.active::before{content:""; position:absolute; left:0; top:7px; bottom:7px; width:3px; background:var(--terra); border-radius:0 3px 3px 0;}
  .sb-nav button .ico{display:inline-flex; opacity:.85;}
  .sb-nav button.active .ico{opacity:1; color:var(--terra2);}
  .sb-nav{flex:1; overflow-y:auto; padding:10px 0;}
  .sb-nav button{display:flex; align-items:center; gap:11px; width:100%; background:none; border:none; color:#C9D4E2; font-weight:600; font-size:14px; padding:11px 20px; cursor:pointer; text-align:left; position:relative;}
  .sb-nav button:hover{background:rgba(255,255,255,.07); color:#fff;}
  .sb-nav button.active{background:var(--bleu2); color:#fff;}
  .sb-nav button.active::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--terra);}
  .sb-nav .ico{font-size:17px; width:22px; text-align:center;}
  .sb-nav .badge{margin-left:auto; background:var(--terra); color:#fff; font-size:11px; font-weight:700; padding:1px 8px; border-radius:20px;}
  .sb-foot{padding:14px 20px; border-top:1px solid rgba(255,255,255,.1); font-size:12px;}
  .sb-foot .who{display:flex; align-items:center; gap:9px; margin-bottom:8px;}
  .avatar{width:34px; height:34px; border-radius:50%; background:var(--terra); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; flex-shrink:0;}
  .avatar.sm{width:28px; height:28px; font-size:12px;}
  .avatar.lg{width:46px; height:46px; font-size:18px;}
  .main{flex:1; margin-left:230px; display:flex; flex-direction:column; min-height:100vh;}
  .topbar{background:#fff; border-bottom:1px solid #E8E2D4; padding:12px 22px; display:flex; align-items:center; gap:14px; position:sticky; top:0; z-index:30;}
  .topbar .menu-btn{display:none; background:none; border:none; font-size:22px; cursor:pointer; color:var(--bleu);}
  .topbar h2{font-size:18px; color:var(--bleu);}
  .topbar .sp{flex:1;}
  .content{padding:22px; flex:1;}
  .panel{background:#fff; border-radius:14px; padding:18px; box-shadow:var(--ombre); margin-bottom:16px;}
  .panel h3{font-size:15px; color:var(--bleu); margin-bottom:10px; display:flex; align-items:center; gap:8px;}
  .grid{display:grid; gap:14px;}
  .g2{grid-template-columns:repeat(2,1fr);} .g3{grid-template-columns:repeat(3,1fr);} .g4{grid-template-columns:repeat(4,1fr);}
  .empty{text-align:center; color:var(--gris); padding:26px; font-size:13.5px;}

  /* cards stat */
  .stat{background:#fff; border-radius:14px; padding:16px; box-shadow:var(--ombre); border-left:4px solid var(--bleu);}
  .stat.t{border-color:var(--terra);} .stat.v{border-color:var(--vert);} .stat.r{border-color:var(--rouge);} .stat.y{border-color:var(--jaune);}
  .stat .v{font-size:26px; font-weight:800; color:var(--bleu);}
  .stat .l{font-size:12px; color:var(--gris); font-weight:600; text-transform:uppercase; letter-spacing:.4px;}

  /* ===== POLISH ESTHÉTIQUE ===== */
  .sb-logo{display:flex; align-items:center; gap:11px;}
  .sb-logo .logo-mark{flex-shrink:0; filter:drop-shadow(0 3px 8px rgba(0,0,0,.25));}
  .sb-logo .wm{font-size:19px;}
  .content{animation:fadeUp .35s ease;}
  @keyframes fadeUp{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
  .panel{border:1px solid rgba(15,42,74,.04); transition:box-shadow .2s, transform .2s;}
  .stat{position:relative; overflow:hidden; transition:transform .18s, box-shadow .18s;}
  .stat:hover{transform:translateY(-3px); box-shadow:0 10px 30px rgba(15,42,74,.12);}
  .stat::after{content:""; position:absolute; right:-20px; top:-20px; width:80px; height:80px; border-radius:50%; background:currentColor; opacity:.04;}
  .stat.t{color:var(--terra);} .stat.v{color:var(--vert);} .stat.r{color:var(--rouge);} .stat.y{color:var(--jaune);}
  .stat .v{color:inherit;} .stat:not(.t):not(.v):not(.r):not(.y){color:var(--bleu);}
  .stat .l{color:var(--gris);}
  .avatar{background:linear-gradient(135deg,var(--terra),#A8481F); box-shadow:0 2px 6px rgba(200,94,45,.3);}
  .sb-nav button.active{box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);}
  .topbar{backdrop-filter:saturate(1.1); box-shadow:0 1px 0 rgba(15,42,74,.04);}
  .topbar h2{font-weight:800; letter-spacing:-.3px;}
  .badge,.mcount{box-shadow:0 1px 3px rgba(200,94,45,.4);}
  .chan.active,.mfolder.active,.mail-row.active{box-shadow:inset 3px 0 0 var(--terra);}
  ::-webkit-scrollbar{width:10px; height:10px;}
  ::-webkit-scrollbar-thumb{background:rgba(15,42,74,.18); border-radius:8px; border:2px solid transparent; background-clip:padding-box;}
  ::-webkit-scrollbar-thumb:hover{background:rgba(15,42,74,.32); background-clip:padding-box;}
  .section-title{display:flex; align-items:center; gap:9px; font-size:19px; font-weight:800; color:var(--bleu); letter-spacing:-.3px; margin-bottom:4px;}
  body.dark .panel{border-color:#22344a;}
  body.dark .stat{background:#16263a;}
  body.dark .section-title{color:#E8EDF3;}
  /* graphiques BI */
  .chart-bars{display:flex; align-items:flex-end; gap:10px; height:200px; padding-top:10px;}
  .chart-bars .cb{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; height:100%; justify-content:flex-end;}
  .chart-bars .cb .bar{width:100%; max-width:46px; border-radius:7px 7px 0 0; background:linear-gradient(180deg,var(--bleu3),var(--bleu)); transition:height .5s ease; min-height:3px; position:relative;}
  .chart-bars .cb .bar.t{background:linear-gradient(180deg,var(--terra2),var(--terra));}
  .chart-bars .cb .val{font-size:11px; font-weight:700; color:var(--bleu);}
  .chart-bars .cb .lab{font-size:10.5px; color:var(--gris); font-weight:600; text-align:center;}
  .bi-list .bil{display:flex; align-items:center; gap:10px; padding:9px 0; border-bottom:1px solid #f1ede2;}
  .bi-list .bil .rank{width:22px; height:22px; border-radius:6px; background:var(--creme); color:var(--bleu); font-weight:800; font-size:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .bi-list .bil .barwrap{flex:1; height:8px; background:#EFEAdd; border-radius:6px; overflow:hidden;}
  .bi-list .bil .barwrap i{display:block; height:100%; background:linear-gradient(90deg,var(--terra),var(--terra2)); border-radius:6px;}
  .donut-wrap{display:flex; align-items:center; gap:20px; flex-wrap:wrap;}
  .donut-leg{display:flex; flex-direction:column; gap:7px; font-size:13px;}
  .donut-leg .dl{display:flex; align-items:center; gap:8px;}
  .donut-leg .dl .sw{width:12px; height:12px; border-radius:3px; flex-shrink:0;}
  body.dark .bi-list .bil .barwrap{background:#22344a;}
  /* note vocale + enregistrement */
  .voice-note{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #E6DFD0;border-radius:10px;padding:6px 10px;margin-top:4px;}
  .msg.mine .voice-note{background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.25);}
  #msg-mic.recording{background:var(--rouge)!important;border-color:var(--rouge)!important;animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}

  /* ===== MESSAGERIE ===== */
  .chat-shell{display:flex; gap:0; height:calc(100vh - 130px); background:#fff; border-radius:14px; overflow:hidden; box-shadow:var(--ombre);}
  .chat-side{width:240px; border-right:1px solid #eee; display:flex; flex-direction:column; flex-shrink:0;}
  .chat-side .sec{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:var(--gris); padding:14px 16px 6px;}
  .chan{display:flex; align-items:center; gap:9px; padding:9px 16px; cursor:pointer; font-size:14px; font-weight:600; color:var(--anthra);}
  .chan:hover{background:var(--creme);}
  .chan.active{background:#E8EEF5; color:var(--bleu); border-right:3px solid var(--terra);}
  .chan .badge{margin-left:auto; background:var(--terra); color:#fff; font-size:10px; font-weight:700; padding:1px 7px; border-radius:20px;}
  .chat-main{flex:1; display:flex; flex-direction:column; min-width:0;}
  .chat-head{padding:13px 18px; border-bottom:1px solid #eee; font-weight:700; color:var(--bleu); display:flex; align-items:center; gap:10px;}
  .chat-body{flex:1; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:10px; background:#FBFAF6;}
  .msg{max-width:76%; display:flex; gap:9px;}
  .msg .bubble{background:#fff; border:1px solid #ECE7DA; border-radius:12px; padding:8px 12px;}
  .msg .who{font-size:12px; font-weight:700; color:var(--terra); margin-bottom:2px;}
  .msg .txt{font-size:14px; white-space:pre-wrap; word-break:break-word;}
  .msg .tm{font-size:10px; color:var(--gris2); margin-top:3px; text-align:right;}
  .msg.mine{align-self:flex-end; flex-direction:row-reverse;}
  .msg.mine .bubble{background:#0F2A4A; color:#fff; border-color:#0F2A4A;}
  .msg.mine .who{color:#9FC2E8;}
  .chat-input{display:flex; gap:8px; padding:12px 16px; border-top:1px solid #eee; background:#fff;}
  .chat-input textarea{flex:1; min-height:42px; max-height:120px; border-radius:22px; padding:10px 16px; resize:none;}

  /* ===== KANBAN ===== */
  .kanban{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .kcol{background:#F0ECE0; border-radius:12px; padding:12px; min-height:160px;}
  .kcol h4{font-size:13px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; display:flex; align-items:center; gap:8px;}
  .kcol h4 .ct{margin-left:auto; background:#fff; color:var(--gris); border-radius:20px; padding:0 9px; font-size:12px;}
  .kcard{background:#fff; border-radius:10px; padding:11px 12px; box-shadow:var(--ombre); margin-bottom:9px; cursor:grab; border-left:3px solid var(--gris2);}
  .kcard.high{border-left-color:var(--rouge);} .kcard.med{border-left-color:var(--jaune);} .kcard.low{border-left-color:var(--gris2);}
  .kcard.dragging{opacity:.5;}
  .kcard .ti{font-weight:700; font-size:13.5px; margin-bottom:5px;}
  .kcard .me{font-size:12px; color:var(--gris); display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .kcard .due{font-size:11px; font-weight:700;}
  .kcard .due.late{color:var(--rouge);} .kcard .due.soon{color:var(--jaune);}
  .kcol.drop-hover{outline:2px dashed var(--terra); outline-offset:-4px;}

  /* table */
  .tablewrap{overflow-x:auto;}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; padding:9px 10px; border-bottom:2px solid #eee; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--gris);}
  td{padding:9px 10px; border-bottom:1px solid #f1ede2;}
  th.num,td.num{text-align:right;}

  /* progress */
  .prog{height:10px; background:#E8E2D4; border-radius:20px; overflow:hidden;}
  .prog > i{display:block; height:100%; background:linear-gradient(90deg,#2E6B3E,#3E8B52); border-radius:20px;}
  .prog.warn > i{background:linear-gradient(90deg,#C9962B,#E0B040);}
  .prog.bad > i{background:linear-gradient(90deg,#A33B3B,#C85E2D);}

  /* modal */
  #modal:empty{display:none;}
  .modalbg{position:fixed; inset:0; background:rgba(15,42,74,.5); display:flex; align-items:center; justify-content:center; z-index:100; padding:16px;}
  .modal{background:#fff; border-radius:16px; padding:22px; width:100%; max-width:480px; max-height:90vh; overflow-y:auto; box-shadow:var(--ombre2);}
  .modal h3{color:var(--bleu); font-size:17px;}
  .x{background:none; border:none; font-size:24px; cursor:pointer; color:var(--gris); line-height:1;}

  /* toast */
  #toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%); background:var(--bleu); color:#fff; padding:12px 22px; border-radius:10px; font-weight:600; z-index:200; display:none; box-shadow:var(--ombre2); font-size:14px;}

  .notif-item{display:flex; gap:11px; padding:11px 0; border-bottom:1px solid #f1ede2; align-items:flex-start;}
  .notif-item .ic{font-size:18px; width:26px; text-align:center; flex-shrink:0;}
  .notif-item .tx{flex:1; font-size:13.5px;}
  .notif-item .tx b{color:var(--bleu);}
  .notif-item.urgent .ic{color:var(--rouge);}
  .sound-toggle{display:flex;align-items:center;gap:8px;width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#C9D4E2;border-radius:8px;padding:8px 10px;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:10px;}
  .sound-toggle:hover{background:rgba(255,255,255,.12);}

  /* ===== Réactions & mentions ===== */
  .reactions{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
  .react-chip{display:inline-flex;align-items:center;gap:3px;background:#EFEAdd;border:1px solid #e0d9c8;border-radius:20px;padding:1px 7px;font-size:12px;cursor:pointer;line-height:1.6;}
  .react-chip.mine{background:#D9E6F2;border-color:#9FC2E8;color:var(--bleu);}
  .react-chip:hover{filter:brightness(.97);}
  .msg.mine .react-chip{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.25);color:#fff;}
  .react-add{opacity:.6;cursor:pointer;padding:2px 5px;border-radius:50%;}
  .react-add:hover{opacity:1;background:var(--creme);}
  .react-pop{position:absolute;background:#fff;border:1px solid #e5e0d2;border-radius:24px;padding:4px 6px;box-shadow:var(--ombre2);display:flex;gap:3px;z-index:60;}
  .react-pop span{cursor:pointer;font-size:19px;padding:2px 4px;border-radius:50%;}
  .react-pop span:hover{background:var(--creme);transform:scale(1.15);}
  .mention{background:#E2EEF6;color:#1B3D63;border-radius:4px;padding:0 3px;font-weight:600;}
  .msg.mine .mention{background:rgba(255,255,255,.2);color:#fff;}

  /* ===== Sondages ===== */
  .poll{background:#fff;border:1px solid #E6DFD0;border-radius:12px;padding:12px;max-width:340px;}
  .msg.mine .poll{color:var(--anthra);}

const firebaseConfig = {

const FB_OK = !!(firebaseConfig.apiKey && firebaseConfig.projectId);

let fbReadyP = null;
function fbReady(){
  if(!FB_OK) return Promise.reject("non configuré");
  if(fbReadyP) return fbReadyP;
  fbReadyP = new Promise((resolve)=>{
    let done=false; const ok=()=>{ if(!done){done=true; resolve();} };

    else ok();
  });

}

/* ============ Helpers ============ */
const el = id => document.getElementById(id);
const esc = s => String(s??"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const today = () => new Date().toISOString().slice(0,10);
const nowISO = () => new Date().toISOString();
const uid = () => "w"+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
function toast(m){ const t=el("toast"); t.textContent=m; t.style.display="block"; clearTimeout(t._t); t._t=setTimeout(()=>t.style.display="none",2600); }
function initials(name){ return (name||"?").trim().split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase(); }
function frDate(d){ if(!d) return ""; const p=String(d).slice(0,10).split("-"); return p.length===3?p[2]+"/"+p[1]+"/"+p[0]:d; }
function timeAgo(iso){
  if(!iso) return "";
  const s=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(s<60) return "à l'instant";
  if(s<3600) return Math.floor(s/60)+" min";
  if(s<86400) return Math.floor(s/3600)+" h";
  if(s<604800) return Math.floor(s/86400)+" j";
  return frDate(iso);
}
function clockHM(iso){ const d=new Date(iso); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
async function sha256(txt){
  if(window.crypto && crypto.subtle){
    const buf=await crypto.subtle.digest("SHA-256", new TextEncoder().encode(txt));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
  }
  let h=0; for(let i=0;i<txt.length;i++){ h=(h*31+txt.charCodeAt(i))|0; } return "x"+(h>>>0).toString(16);
}
// Compresse une image en dataURL JPEG (pour partage dans la messagerie)
function compressImage(file, maxSize, quality){
  maxSize=maxSize||1100; quality=quality||0.7;
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=e=>{ const img=new Image(); img.onload=()=>{
      let {width:w,height:h}=img;
      if(w>h){ if(w>maxSize){ h=Math.round(h*maxSize/w); w=maxSize; } } else { if(h>maxSize){ w=Math.round(w*maxSize/h); h=maxSize; } }
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      resolve(c.toDataURL("image/jpeg", quality));
    }; img.onerror=reject; img.src=e.target.result; };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}
function fileToDataURL(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=()=>rej(r.error||new Error("read error")); r.readAsDataURL(file); }); }
function humanSize(b){ if(b<1024) return b+" o"; if(b<1048576) return (b/1024).toFixed(0)+" Ko"; return (b/1048576).toFixed(1)+" Mo"; }
function fileExtLabel(name,mime){ const ext=(name||"").split(".").pop().toUpperCase(); if(ext&&ext.length<=4) return ext; if(/pdf/.test(mime)) return "PDF"; if(/image/.test(mime)) return "IMG"; return "FIC"; }
// linkifie les URL d'un texte déjà échappé
function linkify(escaped){
  return escaped.replace(/(https?:\/\/[^\s<]+)/g, u=>`<a href="${u}" target="_blank" rel="noopener" style="text-decoration:underline">${u}</a>`);
}

/* ============ Couche données Firebase ============ */
// Lit le blob Gestion (comptes employés + données métier pour les notifications)
async function loadGestion(){
  if(!FB_OK) return;
  await fbReady();
  const snap = await fdb.collection("distrivia").doc("etat").get();
  if(snap.exists){
    try{ gestionState = JSON.parse(snap.data().blob||"{}"); users = gestionState.users||[]; }catch(e){ console.warn("blob:",e); }
  }
}
// Écoute temps réel d'une collection ws_*
function listenWs(coll, cb){
  if(!FB_OK) return ()=>{};
  return fdb.collection(coll).onSnapshot(snap=>{
    cb(snap.docs.map(d=>({ _id:d.id, ...d.data() })));
  }, err=>console.warn("listen "+coll+":", err && err.code));
}
async function wsAdd(coll, row){ if(!FB_OK) return; await fbReady(); await fdb.collection(coll).doc(row.id).set(row); }
async function wsUpdate(coll, id, patch){ if(!FB_OK) return; await fbReady(); await fdb.collection(coll).doc(id).update(patch); }
async function wsDelete(coll, id){ if(!FB_OK) return; await fbReady(); await fdb.collection(coll).doc(id).delete(); }

// présence : signale que je suis en ligne (heartbeat)
let presenceTimer = null;
async function beat(){
  if(!FB_OK || !session) return;
  try{ await fdb.collection("ws_presence").doc(String(session.userId)).set({ userId:session.userId, name:session.name, at:nowISO(), status:myStatus }); }catch(e){}
}
function startPresence(){ beat(); clearInterval(presenceTimer); presenceTimer=setInterval(beat, 60000); }

// Attache tous les listeners temps réel après connexion
let listenersAttached = false;
function attachListeners(){
  if(listenersAttached || !FB_OK) return; listenersAttached = true;
  let firstMsgs=true;
  listenWs("ws_messages", rows=>{
    const prevIds=new Set(wsMessages.map(m=>m._id));
    const incoming = rows.filter(m=>!prevIds.has(m._id) && m.from!==session.userId);
    wsMessages=rows;
    // son : nouveau message de chat OU nouvel email pour moi
    const ring = incoming.some(m=> (m.type==="chan"||m.type==="dm") || (m.type==="email" && !m.draft && (m.to||[]).includes(session.userId)) );
    if(!firstMsgs && ring){ notifySound();
      const chatMsg=incoming.find(m=>m.type==="chan"||m.type==="dm");
      const mailMsg=incoming.find(m=>m.type==="email" && !m.draft && (m.to||[]).includes(session.userId));
      if(chatMsg) pushNotif("Nouveau message · "+userName(chatMsg.from), (chatMsg.text||"").slice(0,80));
      else if(mailMsg) pushNotif("Nouvel email · "+userName(mailMsg.from), mailMsg.subject||"");
    }
    firstMsgs=false;
    if(view==="messages") renderChatBody();
    else if(view==="email") renderMain();
    updateBadges();
  });
  listenWs("ws_tasks", rows=>{ wsTasks=rows; if(view==="tasks"||view==="home"||view==="calendar"||view==="performance") renderMain(); updateBadges(); });
  listenWs("ws_approvals", rows=>{ wsApprovals=rows; if(view==="approvals"||view==="home") renderMain(); updateBadges(); });
  listenWs("ws_announcements", rows=>{ wsAnnouncements=rows; if(["announcements","home","meeting","calendar","wiki","crm","deliveries"].includes(view)) renderMain(); updateBadges(); });
  listenWs("ws_leave", rows=>{ wsLeave=rows; if(view==="leave"||view==="home"||view==="calendar") renderMain(); updateBadges(); });
  listenWs("ws_objectives", rows=>{ wsObjectives=rows; if(view==="objectives"||view==="home") renderMain(); });
  listenWs("ws_presence", rows=>{ wsPresence={}; rows.forEach(r=>wsPresence[r.userId]={at:r.at,status:r.status||"available"}); if(view==="team"||view==="messages") renderMain(); });
  // Messages / réclamations clients venant du portail (portal_threads)
  let firstThreads=true;
  listenWs("portal_threads", rows=>{
    const prevUnread = webThreads.reduce((a,t)=>a+(t.unreadForAdmin?1:0),0);
    webThreads=rows;
    const newUnread = webThreads.reduce((a,t)=>a+(t.unreadForAdmin?1:0),0);
    if(!firstThreads && newUnread>prevUnread){ notifySound(); pushNotif("Nouveau message client", "Une réclamation/message client est arrivé."); }
    firstThreads=false;
    if(view==="clients"||view==="home") renderMain();
    updateBadges();
  });
}

let _audioCtx=null;
function playBeep(){
  try{
    _audioCtx = _audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const ctx=_audioCtx, t=ctx.currentTime;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type="sine"; o.frequency.setValueAtTime(880,t); o.frequency.setValueAtTime(660,t+0.12);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+0.32);
    o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+0.34);
  }catch(e){}
}
function notifySound(){ if(soundOn) playBeep(); }
// Notifications navigateur (s'affichent même quand l'onglet est en arrière-plan)
let notifOn = (function(){ try{ return localStorage.getItem("distrivia-ws-notif")==="1"; }catch(e){ return false; } })();
function requestNotifPerm(){
  if(!("Notification" in window)){ toast("Notifications non supportées par ce navigateur"); return; }
  Notification.requestPermission().then(p=>{ notifOn = (p==="granted"); try{localStorage.setItem("distrivia-ws-notif", notifOn?"1":"0");}catch(e){} toast(notifOn?"Notifications activées ✓":"Notifications refusées"); render(); });
}
function pushNotif(title, body){
  if(!notifOn || !("Notification" in window) || Notification.permission!=="granted") return;
  if(!document.hidden) return; // si l'onglet est visible, le son/badge suffisent
  try{ const n=new Notification(title, { body, icon:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230F2A4A'/%3E%3Ctext x='32' y='44' font-size='34' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'%3ED%3C/text%3E%3C/svg%3E", tag:"distrivia" }); n.onclick=()=>{ window.focus(); n.close(); }; }catch(e){}
}

function bindLogin(){
  const go = async ()=>{
    const login=el("lg-login").value.trim().toLowerCase(), pass=el("lg-pass").value;
    if(!login||!pass){ el("lg-fb").innerHTML=`<div class="err">Identifiant et mot de passe requis.</div>`; return; }
    el("lg-fb").innerHTML=`<p class="muted" style="margin-top:10px">Connexion…</p>`;
    try{
      await loadGestion();
      if(!users.length){ el("lg-fb").innerHTML=`<div class="err">Aucun compte trouvé. Créez d'abord des comptes dans DISTRIVIA Gestion.</div>`; return; }
      const u = users.find(u=>u.login===login);
      if(!u){ el("lg-fb").innerHTML=`<div class="err">Identifiant inconnu.</div>`; return; }
      if(u.active===false){ el("lg-fb").innerHTML=`<div class="err">Compte désactivé — voir l'administrateur.</div>`; return; }
      const h = await sha256((u.salt||"")+pass);
      if(h!==u.hash){ el("lg-fb").innerHTML=`<div class="err">Mot de passe incorrect.</div>`; return; }
      session = { userId:u.id, name:u.name, role:u.role, login:u.login };
      try{ localStorage.setItem("distrivia-ws-session", JSON.stringify(session)); }catch(e){}
      view="home"; afterLogin();
    }catch(e){ el("lg-fb").innerHTML=`<div class="err">${esc(e.message||"Erreur de connexion")}</div>`; }
  };
  el("lg-go").onclick = go;
  el("lg-pass").onkeydown = e=>{ if(e.key==="Enter") go(); };
}
function logout(){
  session=null; try{ localStorage.removeItem("distrivia-ws-session"); }catch(e){}
  listenersAttached=false; clearInterval(presenceTimer); render();
}

/* ============ NOTIFICATIONS AUTO (depuis les données Gestion) ============ */
function computeNotifications(){
  const out=[];
  const S = gestionState||{};
  // stock bas
  (S.products||[]).forEach(p=>{ if(p.stock<=(p.alert||0)){ out.push({ic:icon("box",18), urgent:p.stock<=0, txt:`Stock ${p.stock<=0?"épuisé":"bas"} : <b>${esc(p.name)}</b> (${p.stock} en stock)`, go:"notifications"}); } });
  // commandes web en attente
  // (les commandes web vivent dans portal_orders, pas dans le blob — on compte via Gestion si présent)
  // factures impayées anciennes (>15 j)
  (S.orders||[]).forEach(o=>{
    if(o.status==="cancelled"||!o.invoiceNum) return;
    const paid=(o.payments||[]).reduce((a,p)=>a+p.amount,0);
    const total=(o.lines||[]).reduce((a,l)=>a+l.qty*l.price,0);
    if(total-paid>0 && o.date){
      const days=Math.floor((Date.now()-new Date(o.date).getTime())/86400000);
      if(days>=15) out.push({ic:icon("money",18), urgent:days>=30, txt:`Facture <b>${esc(o.invoiceNum)}</b> impayée depuis ${days} j — reste ${(total-paid).toLocaleString("fr-FR").replace(/[\s\u202f\u00a0]/g," ")} F`, go:"notifications"});
    }
  });
  // tâches en retard qui me concernent
  wsTasks.forEach(tk=>{
    if(tk.status!=="done" && tk.due && tk.due<today()){
      out.push({ic:icon("clock",18), urgent:true, txt:`Tâche en retard : <b>${esc(tk.title)}</b> (${userName(tk.assignee)})`, go:"tasks"});
    }
  });
  return out;
}

/* ============ BADGES (compteurs sidebar) ============ */
function unreadCount(){
  // messages non lus = messages des canaux + DM postérieurs à mon dernier passage (simplifié : non émis par moi aujourd'hui)
  const last = (function(){ try{ return JSON.parse(localStorage.getItem("distrivia-ws-read")||"{}"); }catch(e){ return {}; } })();
  let n=0;
  wsMessages.forEach(m=>{
    if(m.type!=="chan" && m.type!=="dm" && m.type!=="poll") return; // exclut email/signature
    if(m.type==="dm" && m.to!==session.userId && m.from!==session.userId) return;
    const key = m.channel || ("dm:"+[m.from,m.to].sort().join("-"));
    const seen = last[key]||0;
    if(m.from!==session.userId && new Date(m.created).getTime()>seen) n++;
  });
  return n;
}
function myTasksTodo(){ return wsTasks.filter(tk=>tk.assignee===session.userId && tk.status!=="done").length; }
function pendingApprovals(){
  // à valider par moi : si je suis admin ou destinataire
  return wsApprovals.filter(a=>a.status==="pending" && (isAdmin() || a.approver===session.userId)).length;
}
function updateBadges(){
  const set=(id,n)=>{ const b=el("badge-"+id); if(b){ if(n>0){ b.textContent=n; b.style.display=""; } else b.style.display="none"; } };
  set("messages", unreadCount());
  set("email", emailUnreadCount());
  set("tasks", myTasksTodo());
  set("approvals", pendingApprovals());
  set("clients", webThreads.filter(t=>t.unreadForAdmin).length);

  set("notifications", urgent);
  const tb=el("top-bell-badge"); if(tb){ const n=computeNotifications().length; if(n>0){ tb.textContent=n; tb.style.display=""; } else tb.style.display="none"; }
}

/* ============ RECHERCHE GLOBALE (⌘K) ============ */
function openCmdK(){
  el("modal").innerHTML=`<div class="cmdk-bg" id="cmdk-bg"><div class="cmdk">
    <div class="cmdk-in">${icon('inbox',18)}<input id="cmdk-input" placeholder="Rechercher messages, tâches, clients, collègues…" autocomplete="off"></div>
    <div class="cmdk-res" id="cmdk-res"></div>
  </div></div>`;
  el("cmdk-bg").onclick=e=>{ if(e.target.id==="cmdk-bg") closeModal(); };
  const inp=el("cmdk-input"); inp.focus();
  inp.oninput=()=> renderCmdK(inp.value.trim());
  renderCmdK("");
}
function renderCmdK(q){
  const res=el("cmdk-res"); if(!res) return;
  const ql=q.toLowerCase();
  if(!ql){ res.innerHTML=`<div class="cmdk-sec">Accès rapide</div>`+NAV.map(n=>`<div class="cmdk-item" data-cmd="nav:${n[0]}"><span class="ci">${icon(n[2],16)}</span><span class="ct">${n[1]}</span></div>`).join(""); bindCmdK(); return; }
  const out=[];
  // collègues
  users.filter(u=>u.active!==false && u.name.toLowerCase().includes(ql)).slice(0,4).forEach(u=> out.push({sec:"Collègues", ic:"users", t:u.name, m:u.role==="admin"?"Admin":"Employé", cmd:"dm:"+u.id}));
  // tâches
  wsTasks.filter(tk=> (tk.title||"").toLowerCase().includes(ql)).slice(0,5).forEach(tk=> out.push({sec:"Tâches", ic:"task", t:tk.title, m:userName(tk.assignee)+" · "+(tk.status==="done"?"terminé":tk.status==="doing"?"en cours":"à faire"), cmd:"nav:tasks"}));
  // clients
  webThreads.filter(t=> threadName(t).toLowerCase().includes(ql)).slice(0,4).forEach(t=> out.push({sec:"Clients", ic:"inbox", t:threadName(t), m:"conversation client", cmd:"client:"+t._id}));
  // messages
  wsMessages.filter(m=> (m.type==="chan"||m.type==="dm") && !m.recalled && (m.text||"").toLowerCase().includes(ql)).slice(0,6).forEach(m=> out.push({sec:"Messages", ic:"chat", t:(m.text||"").slice(0,60), m:userName(m.from)+" · "+(m.channel?("#"+m.channel):"privé"), cmd:m.channel?("chan:"+m.channel):("dm:"+(m.from===session.userId?m.to:m.from))}));
  // annonces
  wsAnnouncements.filter(a=>(a.type==null||a.type==="announcement") && ((a.title||"").toLowerCase().includes(ql)||(a.body||"").toLowerCase().includes(ql))).slice(0,3).forEach(a=> out.push({sec:"Annonces", ic:"megaphone", t:a.title, m:"annonce", cmd:"nav:announcements"}));
  wsAnnouncements.filter(a=>a.type==="wiki" && ((a.title||"").toLowerCase().includes(ql)||(a.body||"").toLowerCase().includes(ql))).slice(0,4).forEach(a=> out.push({sec:"Base de connaissances", ic:"megaphone", t:a.title, m:a.cat||"wiki", cmd:"wiki:"+a._id}));
  if(!out.length){ res.innerHTML=`<div class="cmdk-item"><span class="ct muted">Aucun résultat pour « ${esc(q)} »</span></div>`; return; }
  let html="", lastSec="";
  out.forEach(o=>{ if(o.sec!==lastSec){ html+=`<div class="cmdk-sec">${o.sec}</div>`; lastSec=o.sec; } html+=`<div class="cmdk-item" data-cmd="${o.cmd}"><span class="ci">${icon(o.ic,16)}</span><span class="ct">${esc(o.t)}</span><span class="cm">${esc(o.m)}</span></div>`; });
  res.innerHTML=html; bindCmdK();
}
function bindCmdK(){
  document.querySelectorAll("#cmdk-res [data-cmd]").forEach(it=> it.onclick=()=>{
    const cmd=it.dataset.cmd; closeModal();
    if(cmd.startsWith("nav:")){ view=cmd.slice(4); render(); }
    else if(cmd.startsWith("dm:")){ view="messages"; dmWith=+cmd.slice(3); render(); }
    else if(cmd.startsWith("chan:")){ view="messages"; dmWith=null; currentChannel=cmd.slice(5); render(); }
    else if(cmd.startsWith("client:")){ view="clients"; activeClientThread=cmd.slice(7); render(); }
    else if(cmd.startsWith("wiki:")){ view="wiki"; activeWiki=cmd.slice(5); render(); }
  });
}

      }).join("")}
      <div class="sec">Messages privés</div>
      ${others.map(u=>{
        const unread = dmUnread(u.id);

function currentThreadKey(){ return dmWith ? ("dm:"+[session.userId,dmWith].sort().join("-")) : ("chan:"+currentChannel); }
function threadMessages(){
  if(dmWith){ return wsMessages.filter(m=> m.type==="dm" && ((m.from===session.userId&&m.to===dmWith)||(m.from===dmWith&&m.to===session.userId))); }
  return wsMessages.filter(m=> m.channel===currentChannel);
}
function chanUnread(chId){
  const last=getRead("chan:"+chId);
  return wsMessages.filter(m=>m.channel===chId && m.from!==session.userId && new Date(m.created).getTime()>last).length;
}
function dmUnread(uId){
  const last=getRead("dm:"+[session.userId,uId].sort().join("-"));
  return wsMessages.filter(m=>m.type==="dm" && m.from===uId && m.to===session.userId && new Date(m.created).getTime()>last).length;
}
function getRead(key){ try{ return (JSON.parse(localStorage.getItem("distrivia-ws-read")||"{}"))[key]||0; }catch(e){ return 0; } }
function markRead(key){ try{ const o=JSON.parse(localStorage.getItem("distrivia-ws-read")||"{}"); o[key]=Date.now(); localStorage.setItem("distrivia-ws-read", JSON.stringify(o)); }catch(e){} }
function renderChatHead(){

  else { const ch=CHANNELS.find(c=>c.id===currentChannel); h.innerHTML=`<span style="color:var(--gris);font-weight:800;font-size:18px">#</span> <span>${ch.name}</span> <span class="muted" style="font-size:12px;font-weight:400">· canal d'équipe</span>`; }
}
function msgById(id){ return wsMessages.find(m=>m.id===id || m._id===id); }
function renderMentions(text){
  // surligne @Prénom + rend les liens cliquables
  let html = esc(text).replace(/@([\wÀ-ÿ\-]+)/g, (full, name)=>{
    const u=users.find(u=> u.name.split(" ")[0].toLowerCase()===name.toLowerCase() || u.name.toLowerCase()===name.toLowerCase() || (u.login||"").toLowerCase()===name.toLowerCase());
    return u ? `<span class="mention">@${esc(u.name.split(" ")[0])}</span>` : full;
  });
  return linkify(html);
}
function attachmentHTML(m){
  const a=m.attachment; if(!a) return "";
  if(a.type==="image"){
    return `<img class="msg-img" src="${a.data}" alt="${esc(a.name||'image')}" data-img="${esc(a.data)}" style="max-width:240px;max-height:240px;border-radius:10px;margin-top:4px;cursor:pointer;display:block">`;
  }
  if(a.type==="audio"){
    return `<div class="voice-note">${icon('mic',15)}<audio controls src="${a.data}" style="height:34px;max-width:230px"></audio>${a.dur?`<span class="muted" style="font-size:11px">${a.dur}s</span>`:""}</div>`;
  }
  return `<a class="file-chip" href="${a.data}" download="${esc(a.name||'fichier')}"><span class="file-ic">${icon('box',16)}<i>${esc(fileExtLabel(a.name,a.mime))}</i></span><span class="file-meta"><b>${esc(a.name||'fichier')}</b><span>${a.size?humanSize(a.size):""}</span></span></a>`;
}
function detectMentions(text){
  const ids=[];
  (text.match(/@([\wÀ-ÿ\-]+)/g)||[]).forEach(tok=>{
    const name=tok.slice(1);
    const u=users.find(u=> u.name.split(" ")[0].toLowerCase()===name.toLowerCase() || u.name.toLowerCase()===name.toLowerCase() || (u.login||"").toLowerCase()===name.toLowerCase());
    if(u && !ids.includes(u.id)) ids.push(u.id);
  });
  return ids;
}
function pollHTML(m){
  const p=m.poll; if(!p) return "";
  const total=p.options.reduce((a,o)=>a+(o.votes||[]).length,0);
  return `<div class="poll"><h5>${icon('approve',14)} ${esc(p.question)}</h5>
    ${p.options.map((o,i)=>{ const v=(o.votes||[]).length; const pct=total?Math.round(v/total*100):0; const voted=(o.votes||[]).includes(session.userId);
      return `<div class="poll-opt ${voted?'voted':''}" data-pollvote="${m.id||m._id}|${i}"><div class="fill" style="width:${pct}%"></div><span class="lab">${voted?icon('check',12)+' ':''}${esc(o.text)}</span><span class="pct">${pct}% (${v})</span></div>`;
    }).join("")}
    <div class="muted" style="font-size:11px;margin-top:4px">${total} vote${total>1?"s":""} · sondage de ${esc(userName(m.from))}</div>
  </div>`;
}
function reactionsHTML(m){
  const r=m.reactions||{}; const keys=Object.keys(r).filter(k=>(r[k]||[]).length);
  const chips = keys.map(emo=>{ const arr=r[emo]||[]; const mine=arr.includes(session.userId); return `<span class="react-chip ${mine?'mine':''}" data-react="${m.id||m._id}|${emo}" title="${arr.map(id=>userName(id)).join(", ")}">${emo} ${arr.length}</span>`; }).join("");
  return `<div class="reactions">${chips}<span class="react-add" data-reactadd="${m.id||m._id}" title="Réagir">${icon('plus',13)}</span></div>`;
}
function renderChatBody(){
  const b=el("chat-body"); if(!b) return;

  if(!msgs.length){ b.innerHTML=`<div class="empty">Démarrez la conversation.</div>`; }
  else {
    b.innerHTML = msgs.map(m=>{
      const mine=m.from===session.userId;

      let quote="";

        <div style="max-width:100%">

  if(i>=0){ reactions[emo].splice(i,1); if(!reactions[emo].length) delete reactions[emo]; }

}

let mediaRec=null, recChunks=[], recTimer=null, recStart=0;
async function toggleRecording(){
  const mic=el("msg-mic");
  if(mediaRec && mediaRec.state==="recording"){ mediaRec.stop(); return; }
  if(!navigator.mediaDevices || !window.MediaRecorder){ return toast("Enregistrement audio non supporté par ce navigateur"); }
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    let mime="audio/webm"; if(window.MediaRecorder.isTypeSupported && !MediaRecorder.isTypeSupported(mime)){ mime= MediaRecorder.isTypeSupported("audio/mp4")?"audio/mp4":""; }
    mediaRec = mime ? new MediaRecorder(stream, {mimeType:mime, audioBitsPerSecond:24000}) : new MediaRecorder(stream);
    recChunks=[]; recStart=Date.now();
    mediaRec.ondataavailable=e=>{ if(e.data.size) recChunks.push(e.data); };
    mediaRec.onstop=async ()=>{
      stream.getTracks().forEach(t=>t.stop());
      if(recTimer){ clearInterval(recTimer); recTimer=null; }
      const dur=Math.round((Date.now()-recStart)/1000);
      if(mic){ mic.classList.remove("recording"); mic.innerHTML=icon('mic',16); }
      const blob=new Blob(recChunks, {type:mediaRec.mimeType||"audio/webm"});
      if(blob.size>680*1024){ return toast("Note vocale trop longue (max ~60s)"); }
      const data=await fileToDataURL(blob);
      pendingAttach={ type:"audio", name:"note-vocale", mime:blob.type, size:blob.size, dur, data };
      renderAttachZone();
    };
    mediaRec.start();
    if(mic){ mic.classList.add("recording"); }
    recTimer=setInterval(()=>{ const s=Math.round((Date.now()-recStart)/1000); if(mic) mic.innerHTML=`<span style="font-size:12px;color:#fff">● ${s}s</span>`; if(s>=60 && mediaRec.state==="recording") mediaRec.stop(); }, 250);
    toast("Enregistrement… reclic pour arrêter");
  }catch(e){ toast("Micro non autorisé"); }
}

  if(opts.mode==="reply" && src){ preTo=[src.from]; preSubject=(/^re\s*:/i.test(src.subject||"")?"":"Re : ")+(src.subject||""); preBody=`\n\n──────────\nLe ${frDate(src.created)}, ${userName(src.from)} a écrit :\n${(src.body||"")}`; }
  else if(opts.mode==="replyall" && src){ preTo=[src.from, ...(src.to||[])].filter(id=>id!==session.userId); preTo=[...new Set(preTo)]; preSubject=(/^re\s*:/i.test(src.subject||"")?"":"Re : ")+(src.subject||""); preBody=`\n\n──────────\nLe ${frDate(src.created)}, ${userName(src.from)} a écrit :\n${(src.body||"")}`; }
  else if(opts.mode==="forward" && src){ preSubject=(/^tr\s*:/i.test(src.subject||"")?"":"Tr : ")+(src.subject||""); preBody=`\n\n──────────\nMessage transféré — de ${userName(src.from)}, le ${frDate(src.created)} :\n${(src.body||"")}`; }
  else if(opts.mode==="draft" && src){ preTo=src.to||[]; preSubject=src.subject||""; preBody=src.body||""; draftId=src._id; }
  const sig=sigOf(session.userId);
  openModal(`<div class="row" style="justify-content:space-between"><h3>${icon('send',16)} ${opts.mode==='draft'?'Brouillon':'Nouveau message'}</h3><button class="x" onclick="closeModal()">×</button></div>
    <label>Destinataires</label>
    <div class="recip-pick" id="cm-recips">
      ${others.map(u=>`<span class="recip-chip ${preTo.includes(u.id)?'':'off'}" data-recip="${u.id}">${esc(u.name)}</span>`).join("")}
    </div>
    <label>Objet</label><input id="cm-subject" value="${esc(preSubject)}" placeholder="Objet du message">
    <label>Message</label><textarea id="cm-body" rows="8" placeholder="Votre message…">${esc(preBody)}</textarea>
    <div style="margin-top:8px;background:var(--creme);border-radius:8px;padding:10px 12px">
      <div class="muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Signature ajoutée automatiquement</div>
      ${signatureBlockHTML(sig)}
    </div>
    <div class="row" style="justify-content:space-between;margin-top:14px">
      <button class="btn ghost sm" id="cm-draft">Enregistrer le brouillon</button>
      <button class="btn b" id="cm-send">${icon('send',14)} Envoyer</button>
    </div>`);
  const selected=new Set(preTo);
  document.querySelectorAll("[data-recip]").forEach(c=> c.onclick=()=>{ const id=+c.dataset.recip; if(selected.has(id)){ selected.delete(id); c.classList.add("off"); } else { selected.add(id); c.classList.remove("off"); } });
  const gather=(draft)=>{
    const to=[...selected]; const subject=el("cm-subject").value.trim(); const body=el("cm-body").value;
    return { to, subject, body };
  };
  el("cm-send").onclick=async ()=>{
    const {to,subject,body}=gather();
    if(!to.length) return toast("Choisissez au moins un destinataire");
    if(!subject && !body.trim()) return toast("Ajoutez un objet ou un message");
    const row={ id: draftId||uid(), type:"email", from:session.userId, to, subject, body, signature:sig, readBy:[], flaggedBy:[], created:nowISO() };
    if(draftId){ await wsUpdate("ws_messages", draftId, {...row, draft:false}); }
    else { await wsAdd("ws_messages", row); }
    closeModal(); emailFolder="sent"; activeEmail=row.id; toast("Email envoyé ✓"); renderMain();
  };
  el("cm-draft").onclick=async ()=>{
    const {to,subject,body}=gather();
    const row={ id: draftId||uid(), type:"email", draft:true, from:session.userId, to, subject, body, signature:sig, readBy:[], flaggedBy:[], created:nowISO() };
    if(draftId){ await wsUpdate("ws_messages", draftId, row); } else { await wsAdd("ws_messages", row); }
    closeModal(); emailFolder="drafts"; toast("Brouillon enregistré ✓"); renderMain();
  };
}

/* ============ MESSAGES CLIENTS (réclamations, depuis le portail) ============ */
/* Résout le nom du client d'un thread (le portail stocke party_name) */
function threadName(t){
  if(!t) return "Client";
  let n = t.party_name || t.client_name || t.clientName || t.name || "";
  if(!n && t.party_id && gestionState && gestionState.clients){
    const c = gestionState.clients.find(c=> String(c.id)===String(t.party_id));
    if(c) n = c.name;
  }
  if(!n && (t.party_email||t.client_email) && gestionState && gestionState.clients){
    const em=(t.party_email||t.client_email).toLowerCase();
    const c = gestionState.clients.find(c=> c.email && c.email.toLowerCase()===em);
    if(c) n = c.name;
  }
  if(!n){ const em=t.party_email||t.client_email; if(em) n = em.split("@")[0]; }
  return n || "Client";
}
function threadIsSupplier(t){ return (t.kind==="supplier") || String(t._id||"").startsWith("s_"); }
function vClients(){
  const threads=[...webThreads].sort((a,b)=>((b.updated||b.lastDate||"")<(a.updated||a.lastDate||"")?-1:1));
  const active = threads.find(t=>t._id===activeClientThread) || threads[0] || null;
  if(active) activeClientThread=active._id;
  return `<div class="chat-shell">
    <div class="chat-side" style="width:280px">
      <div class="sec">Conversations clients (${threads.length})</div>
      ${threads.length? threads.map(t=>{
        const last=(t.messages||[])[ (t.messages||[]).length-1 ];
        const unread=t.unreadForAdmin;
        return `<div class="chan ${active&&active._id===t._id?'active':''}" data-cthread="${esc(t._id)}" style="align-items:flex-start;flex-direction:column;gap:2px">
          <div style="display:flex;align-items:center;gap:8px;width:100%"><span class="avatar sm">${initials(threadName(t))}</span><b style="flex:1;font-size:13px">${esc(threadName(t))}</b>${unread?`<span class="badge">●</span>`:""}</div>
          <div class="muted" style="font-size:11px;padding-left:36px;width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc((last?last.text:"")||"")}</div>
        </div>`;
      }).join("") : `<div class="empty" style="padding:18px;font-size:13px">Aucune conversation client pour l'instant.<br><br>Les messages envoyés depuis le portail clients apparaîtront ici.</div>`}
    </div>
    <div class="chat-main">
      ${active?`
        <div class="chat-head"><span class="avatar sm">${initials(threadName(active))}</span> ${esc(threadName(active))} <span class="muted" style="font-size:12px;font-weight:400">· ${threadIsSupplier(active)?"fournisseur":"réclamation / message client"}</span></div>
        <div class="chat-body" id="cl-body"></div>
        <div class="chat-input">
          <textarea id="cl-input" rows="1" placeholder="Répondre au client…"></textarea>
          <button class="btn" id="cl-send">${icon('send',16)} Répondre</button>
        </div>` : `<div class="empty" style="margin:auto">Sélectionnez une conversation.</div>`}
    </div>
  </div>`;
}
function renderClientBody(){
  const b=el("cl-body"); if(!b) return;
  const t=webThreads.find(x=>x._id===activeClientThread); if(!t){ b.innerHTML=`<div class="empty">—</div>`; return; }
  const msgs=t.messages||[];
  b.innerHTML = msgs.length? msgs.map(m=>{
    const fromStaff = m.from==="DISTRIVIA";
    return `<div class="msg ${fromStaff?'mine':''}">
      ${fromStaff?"":`<div class="avatar sm">${initials(threadName(t))}</div>`}
      <div class="bubble">${fromStaff&&m.by?`<div class="who">${esc(m.by)}</div>`:""}<div class="txt">${esc(m.text)}</div><div class="tm">${clockHM(m.date)}</div></div>
    </div>`;
  }).join("") : `<div class="empty">Aucun message.</div>`;
  b.scrollTop=b.scrollHeight;
}
function bindClients(){
  document.querySelectorAll("[data-cthread]").forEach(c=> c.onclick=()=>{ activeClientThread=c.dataset.cthread; renderMain(); });
  renderClientBody();
  // marquer lu
  const t=webThreads.find(x=>x._id===activeClientThread);
  if(t && t.unreadForAdmin){ wsUpdate("portal_threads", t._id, { unreadForAdmin:false }).catch(()=>{}); }
  const send=el("cl-send"), inp=el("cl-input");
  const doSend=async ()=>{
    const txt=(inp.value||"").trim(); if(!txt||!t) return; inp.value="";
    const msg={ from:"DISTRIVIA", text:txt, date:nowISO(), by:session.name };
    const messages=[...(t.messages||[]), msg];
    try{ await wsUpdate("portal_threads", t._id, { messages, lastFrom:"DISTRIVIA", lastText:txt, updated:nowISO(), unreadForAdmin:false }); }
    catch(e){ toast("Échec d'envoi"); inp.value=txt; }
  };
  if(send) send.onclick=doSend;
  if(inp) inp.onkeydown=e=>{ if(e.key==="Enter"&&!e.shiftKey){ e.preventDefault(); doSend(); } };
}

let taskFilter = "all"; // all | mine
function vTasks(){
  const cols=[["todo","À faire"],["doing","En cours"],["done","Terminé"]];
  const visible = wsTasks.filter(tk=> taskFilter==="all" ? true : tk.assignee===session.userId);
  return `
  <div class="row" style="justify-content:space-between;margin-bottom:14px">
    <div class="row">
      <button class="btn sm ${taskFilter==='all'?'':'ghost'}" data-tf="all">Toutes (${wsTasks.length})</button>
      <button class="btn sm ${taskFilter==='mine'?'':'ghost'}" data-tf="mine">Les miennes (${wsTasks.filter(tk=>tk.assignee===session.userId).length})</button>
    </div>
    <button class="btn b" id="task-new">+ Nouvelle tâche</button>
  </div>
  <div class="kanban">
    ${cols.map(([st,label])=>{
      const items = visible.filter(tk=>(tk.status||"todo")===st).sort((a,b)=>(a.due||"9")<(b.due||"9")?-1:1);
      return `<div class="kcol" data-col="${st}">
        <h4>${label} <span class="ct">${items.length}</span></h4>
        ${items.map(tk=>taskCard(tk)).join("")||`<div class="empty" style="padding:14px;font-size:12px">—</div>`}
      </div>`;
    }).join("")}
  </div>
  <p class="muted" style="font-size:12px;margin-top:12px">Glissez-déposez une carte d'une colonne à l'autre pour changer son statut. Cliquez une carte pour la modifier.</p>`;
}
function taskCard(tk){
  const late = tk.status!=="done" && tk.due && tk.due<today();
  const soon = tk.status!=="done" && tk.due && !late && tk.due<=new Date(Date.now()+2*86400000).toISOString().slice(0,10);
  return `<div class="kcard ${tk.priority||'low'}" draggable="true" data-task="${tk._id}">
    <div class="ti">${esc(tk.title)}</div>
    <div class="me">
      <span class="avatar sm" title="${esc(userName(tk.assignee))}">${initials(userName(tk.assignee))}</span>
      <span class="pill ${tk.priority||'low'}">${prioLabel(tk.priority)}</span>
      ${tk.due?`<span class="due ${late?'late':soon?'soon':''}">${late?'⏰ ':''}${frDate(tk.due)}</span>`:""}
      ${tk.linkOrder?`<span class="muted" style="font-size:11px">${icon("box",12)} ${esc(tk.linkOrder)}</span>`:""}
      ${(tk.subtasks&&tk.subtasks.length)?`<span class="muted" style="font-size:11px">${icon("check",12)} ${tk.subtasks.filter(s=>s.done).length}/${tk.subtasks.length}</span>`:""}
      ${(tk.comments&&tk.comments.length)?`<span class="muted" style="font-size:11px">${icon("chat",12)} ${tk.comments.length}</span>`:""}
    </div>
  </div>`;
}
function taskDialog(tk){
  const opts = users.filter(u=>u.active!==false).map(u=>`<option value="${u.id}" ${tk&&tk.assignee===u.id?"selected":""}>${esc(u.name)}</option>`).join("");
  const subs = (tk&&tk.subtasks)||[];

  const doneCount = subs.filter(s=>s.done).length;
  openModal(`<div class="row" style="justify-content:space-between"><h3>${tk?"Modifier la tâche":"Nouvelle tâche"}</h3><button class="x" onclick="closeModal()">×</button></div>

      <div><label>Assigné à</label><select id="tk-assignee">${opts}</select></div>

      <div><label>Échéance</label><input type="date" id="tk-due" value="${tk?tk.due||"":""}"></div>

    </div>
    ${tk?`
    <label>Sous-tâches ${subs.length?`(${doneCount}/${subs.length})`:""}</label>
    ${subs.length?`<div class="prog" style="margin-bottom:8px"><i style="width:${subs.length?Math.round(doneCount/subs.length*100):0}%"></i></div>`:""}
    <div id="tk-subs">${subs.map((st,i)=>`<div style="display:flex;align-items:center;gap:8px;padding:3px 0"><input type="checkbox" data-sub="${i}" ${st.done?"checked":""} style="width:auto"><span style="flex:1;font-size:13.5px;${st.done?'text-decoration:line-through;color:var(--gris)':''}">${esc(st.text)}</span><button class="x" data-subdel="${i}" style="font-size:16px">×</button></div>`).join("")}</div>
    <div class="row"><input id="tk-subnew" placeholder="Ajouter une sous-tâche…" style="flex:1"><button class="btn ghost sm" id="tk-subadd">+ Ajouter</button></div>
    <label style="margin-top:14px">Commentaires</label>
    <div id="tk-comments" style="max-height:160px;overflow-y:auto">${comments.length?comments.map(c=>`<div style="padding:7px 0;border-bottom:1px solid #f1ede2"><div style="font-size:13px">${esc(c.text)}</div><div class="muted" style="font-size:11px">${esc(userName(c.by))} · ${timeAgo(c.at)}</div></div>`).join(""):`<p class="muted" style="font-size:12.5px">Aucun commentaire.</p>`}</div>
    <div class="row" style="margin-top:6px"><input id="tk-cnew" placeholder="Écrire un commentaire…" style="flex:1"><button class="btn ghost sm" id="tk-cadd">${icon('send',14)}</button></div>
    `:`<p class="muted" style="font-size:12px;margin-top:8px">Sous-tâches et commentaires seront disponibles après la création.</p>`}
    <div class="row" style="justify-content:space-between;margin-top:16px">
      ${tk?`<button class="btn r sm" id="tk-del">Supprimer</button>`:"<span></span>"}

  };
  if(tk){
    el("tk-del").onclick=()=> confirmDialog("Supprimer cette tâche ?", async ()=>{ await wsDelete("ws_tasks", tk._id); closeModal(); toast("Tâche supprimée"); }, {danger:true, ok:"Supprimer"});

    const saveSubs=async (arr)=>{ await wsUpdate("ws_tasks", tk._id, {subtasks:arr}); taskDialog(wsTasks.find(t=>t._id===tk._id)); };
    const addSub=async ()=>{ const v=(el("tk-subnew").value||"").trim(); if(!v) return; const arr=[...((wsTasks.find(t=>t._id===tk._id)||{}).subtasks||[]), {text:v, done:false}]; await saveSubs(arr); };

/* ============ CALENDRIER D'ÉQUIPE ============ */
let calMonth = (function(){ const d=new Date(); return {y:d.getFullYear(), m:d.getMonth()}; })();
function calEvents(){
  // rassemble tâches (échéance), congés (approuvés), réunions
  const ev={}; // "YYYY-MM-DD" -> [{type,label}]
  const add=(date,type,label)=>{ if(!date) return; const k=String(date).slice(0,10); (ev[k]=ev[k]||[]).push({type,label}); };
  wsTasks.forEach(tk=>{ if(tk.due) add(tk.due,"task",tk.title); });
  wsLeave.filter(l=>l.status==="approved").forEach(l=>{
    // étale sur la période
    let d=new Date(l.from), end=new Date(l.to);
    let guard=0;
    while(d<=end && guard<60){ add(d.toISOString().slice(0,10),"leave",userName(l.user)+" — "+l.type); d.setDate(d.getDate()+1); guard++; }
  });
  wsAnnouncements.filter(a=>a.type==="meeting").forEach(a=> add(a.created,"meet",a.title||"Réunion"));
  return ev;
}
function vCalendar(){
  const ev=calEvents();
  const first=new Date(calMonth.y, calMonth.m, 1);
  const startDow=(first.getDay()+6)%7; // lundi=0
  const daysInMonth=new Date(calMonth.y, calMonth.m+1, 0).getDate();
  const monthName=first.toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
  const todayStr=today();
  const cells=[];
  // jours du mois précédent (remplissage)
  const prevDays=new Date(calMonth.y, calMonth.m, 0).getDate();
  for(let i=startDow-1;i>=0;i--) cells.push({d:prevDays-i, other:true});
  for(let d=1; d<=daysInMonth; d++) cells.push({d, other:false});
  while(cells.length%7!==0) cells.push({d:cells.length, other:true, tail:true});
  const dows=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
  return `
  <div class="row" style="justify-content:space-between;margin-bottom:14px">
    <h3 style="color:var(--bleu);text-transform:capitalize">${monthName}</h3>
    <div class="row"><button class="btn ghost sm" id="cal-prev">‹ Précédent</button><button class="btn ghost sm" id="cal-today">Aujourd'hui</button><button class="btn ghost sm" id="cal-next">Suivant ›</button></div>
  </div>
  <div class="panel">
    <div class="cal-grid">${dows.map(d=>`<div class="cal-dow">${d}</div>`).join("")}</div>

function bindCalendar(){

/* ============ PERFORMANCE / CLASSEMENT ============ */
function vPerformance(){
  const stats=users.filter(u=>u.active!==false).map(u=>{
    const done=wsTasks.filter(tk=>tk.status==="done" && (tk.doneBy===u.id||tk.assignee===u.id)).length;
    const onTime=wsTasks.filter(tk=>tk.status==="done" && (tk.doneBy===u.id||tk.assignee===u.id) && (!tk.due || (tk.doneAt&&tk.doneAt.slice(0,10)<=tk.due))).length;
    const active=wsTasks.filter(tk=>tk.assignee===u.id && tk.status!=="done").length;
    const msgs=wsMessages.filter(m=>m.from===u.id && (m.type==="chan"||m.type==="dm") && !m.recalled).length;
    const decisions=wsApprovals.filter(a=>a.decidedBy===u.id).length;
    const score=done*10 + onTime*5 + msgs + decisions*3;
    const rate=done?Math.round(onTime/done*100):0;
    return {u, done, onTime, active, msgs, decisions, score, rate};
  }).sort((a,b)=>b.score-a.score);
  const totalDone=wsTasks.filter(tk=>tk.status==="done").length;
  const totalActive=wsTasks.filter(tk=>tk.status!=="done").length;
  const totalMsgs=wsMessages.filter(m=>!m.recalled).length;
  return `
  <div class="grid g4" style="margin-bottom:16px">
    <div class="stat v"><div class="v">${totalDone}</div><div class="l">Tâches terminées</div></div>
    <div class="stat t"><div class="v">${totalActive}</div><div class="l">Tâches en cours</div></div>
    <div class="stat"><div class="v">${totalMsgs}</div><div class="l">Messages échangés</div></div>
    <div class="stat y"><div class="v">${users.filter(u=>u.active!==false).length}</div><div class="l">Membres actifs</div></div>
  </div>
  <div class="panel"><h3>${icon("target")} Classement de l'équipe</h3>
    <p class="muted" style="font-size:12px;margin-bottom:10px">Score = tâches terminées, délais tenus, participation. Un petit esprit d'équipe pour avancer ensemble.</p>
    ${stats.map((s,i)=>`<div class="rank-row">
      <div class="rank-pos ${i===0?'g1':i===1?'g2':i===2?'g3':''}">${i+1}</div>
      <div class="avatar">${initials(s.u.name)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:700">${esc(s.u.name)}${s.u.id===session.userId?' <span class="muted" style="font-weight:400;font-size:12px">(vous)</span>':''}</div>
        <div class="muted" style="font-size:12px">${s.done} terminées · ${s.rate}% dans les délais · ${s.active} en cours · ${s.msgs} messages</div>
      </div>
      <div style="text-align:right"><div style="font-weight:800;color:var(--bleu);font-size:18px">${s.score}</div><div class="muted" style="font-size:10px">points</div></div>
    </div>`).join("")}
  </div>`;
}

/* ============ TABLEAU DE BORD ANALYTIQUE (BI) ============ */
function moneyF(n){ return Math.round(n||0).toLocaleString("fr-FR").replace(/[\s\u202f\u00a0]/g,"\u00a0"); }
function orderTotal(o){ return (o.lines||[]).reduce((a,l)=>a+(l.qty||0)*(l.price||0),0); }
function orderPaid(o){ return (o.payments||[]).reduce((a,p)=>a+(p.amount||0),0); }
function vDashboard(){
  const S=gestionState||{};
  const orders=(S.orders||[]).filter(o=>o.status!=="cancelled");
  const products=S.products||[]; const clients=S.clients||[];
  // KPI globaux
  const caTotal=orders.reduce((a,o)=>a+orderTotal(o),0);
  const encaisse=orders.reduce((a,o)=>a+Math.min(orderTotal(o),orderPaid(o)),0);
  const impaye=orders.reduce((a,o)=>a+Math.max(0,orderTotal(o)-orderPaid(o)),0);
  const stockValue=products.reduce((a,p)=>a+(p.stock||0)*(p.price||p.cost||0),0);
  const stockBas=products.filter(p=>(p.stock||0)<=(p.alert||0)).length;
  // CA des 6 derniers mois
  const months=[]; const now=new Date();
  for(let i=5;i>=0;i--){ const d=new Date(now.getFullYear(), now.getMonth()-i, 1); months.push({key:d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"), label:d.toLocaleDateString("fr-FR",{month:"short"}), val:0}); }
  orders.forEach(o=>{ if(!o.date) return; const k=String(o.date).slice(0,7); const m=months.find(x=>x.key===k); if(m) m.val+=orderTotal(o); });
  const maxMonth=Math.max(1,...months.map(m=>m.val));
  // top produits (par quantité vendue)
  const prodSales={};
  orders.forEach(o=>(o.lines||[]).forEach(l=>{ const n=l.name||l.product||("#"+l.productId); prodSales[n]=(prodSales[n]||0)+(l.qty||0)*(l.price||0); }));
  const topProd=Object.entries(prodSales).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxProd=Math.max(1,...topProd.map(p=>p[1]));
  // top clients (par CA)
  const cliSales={};
  orders.forEach(o=>{ const n=o.clientName||o.client_name||(clients.find(c=>String(c.id)===String(o.client_id))||{}).name||"Client comptoir"; cliSales[n]=(cliSales[n]||0)+orderTotal(o); });
  const topCli=Object.entries(cliSales).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCli=Math.max(1,...topCli.map(c=>c[1]));
  // ancienneté des impayés
  const aging={"0-15 j":0,"15-30 j":0,"+30 j":0};
  orders.forEach(o=>{ const reste=orderTotal(o)-orderPaid(o); if(reste>0&&o.date){ const days=Math.floor((Date.now()-new Date(o.date).getTime())/86400000); if(days<15) aging["0-15 j"]+=reste; else if(days<30) aging["15-30 j"]+=reste; else aging["+30 j"]+=reste; } });

  if(!orders.length && !products.length){
    return `<div class="panel"><h3>${icon('target')} Tableau de bord</h3><p class="empty">Aucune donnée de Gestion pour le moment. Le tableau de bord se remplira automatiquement dès que des commandes et produits seront enregistrés dans DISTRIVIA Gestion.</p></div>`;
  }
  return `
  <div class="section-title">${icon('target',20)} Pilotage DISTRIVIA</div>
  <p class="muted" style="margin-bottom:16px">Données en direct depuis DISTRIVIA Gestion · ${orders.length} commande${orders.length>1?"s":""}</p>
  <div class="grid g4" style="margin-bottom:18px">
    <div class="stat"><div class="v">${moneyF(caTotal)}</div><div class="l">Chiffre d'affaires (F)</div></div>
    <div class="stat v"><div class="v">${moneyF(encaisse)}</div><div class="l">Encaissé (F)</div></div>
    <div class="stat r"><div class="v">${moneyF(impaye)}</div><div class="l">Impayés (F)</div></div>
    <div class="stat t"><div class="v">${moneyF(stockValue)}</div><div class="l">Valeur du stock (F)</div></div>
  </div>
  <div class="grid g2">
    <div class="panel">
      <h3>${icon('target',16)} Chiffre d'affaires — 6 derniers mois</h3>
      <div class="chart-bars">
        ${months.map(m=>`<div class="cb"><div class="val">${m.val?moneyF(m.val/1000)+"k":""}</div><div class="bar ${m.val===maxMonth&&m.val>0?'t':''}" style="height:${Math.max(2,Math.round(m.val/maxMonth*160))}px"></div><div class="lab">${m.label}</div></div>`).join("")}
      </div>
    </div>
    <div class="panel">
      <h3>${icon('money',16)} Ancienneté des impayés</h3>
      ${impaye>0? `<div class="donut-wrap">${donutSVG([["0-15 j",aging["0-15 j"],"#2E6B3E"],["15-30 j",aging["15-30 j"],"#C9962B"],["+30 j",aging["+30 j"],"#A33B3B"]])}
        <div class="donut-leg">
          ${[["0-15 j","#2E6B3E"],["15-30 j","#C9962B"],["+30 j","#A33B3B"]].map(([k,c])=>`<div class="dl"><span class="sw" style="background:${c}"></span>${k} : <b style="margin-left:4px">${moneyF(aging[k])} F</b></div>`).join("")}
        </div></div>` : `<p class="empty">Aucun impayé. Trésorerie saine 👍</p>`}
    </div>
    <div class="panel">
      <h3>${icon('box',16)} Top 5 produits (par CA)</h3>
      <div class="bi-list">
        ${topProd.length? topProd.map(([n,v],i)=>`<div class="bil"><span class="rank">${i+1}</span><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n)}</div><div class="barwrap"><i style="width:${Math.round(v/maxProd*100)}%"></i></div></div><b style="font-size:12.5px;white-space:nowrap">${moneyF(v)} F</b></div>`).join("") : `<p class="empty">Aucune vente enregistrée.</p>`}
      </div>
    </div>
    <div class="panel">
      <h3>${icon('users',16)} Top 5 clients (par CA)</h3>
      <div class="bi-list">
        ${topCli.length? topCli.map(([n,v],i)=>`<div class="bil"><span class="rank">${i+1}</span><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(n)}</div><div class="barwrap"><i style="width:${Math.round(v/maxCli*100)}%"></i></div></div><b style="font-size:12.5px;white-space:nowrap">${moneyF(v)} F</b></div>`).join("") : `<p class="empty">Aucun client avec commande.</p>`}
      </div>
    </div>
  </div>
  ${stockBas? `<div class="panel" style="border-left:4px solid var(--rouge)"><h3>${icon('box',16)} Alerte stock</h3><p style="font-size:14px">${stockBas} produit${stockBas>1?"s":""} sous le seuil d'alerte. <a onclick="goView('notifications')" style="cursor:pointer;font-weight:700">Voir les détails →</a></p></div>`:""}`;
}
function donutSVG(parts){
  const total=parts.reduce((a,p)=>a+p[1],0)||1;
  let acc=0; const r=54, c=2*Math.PI*r, cx=64, cy=64;
  const segs=parts.map(([k,v,col])=>{ const frac=v/total; const dash=frac*c; const seg=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="18" stroke-dasharray="${dash} ${c-dash}" stroke-dashoffset="${-acc*c}" transform="rotate(-90 ${cx} ${cy})"/>`; acc+=frac; return seg; });
  return `<svg width="128" height="128" viewBox="0 0 128 128">${segs.join("")}<circle cx="${cx}" cy="${cy}" r="34" fill="var(--blanc)"/><text x="64" y="60" text-anchor="middle" font-size="13" font-weight="800" fill="#0F2A4A">Total</text><text x="64" y="76" text-anchor="middle" font-size="12" fill="#888">${moneyF(total/1000)}k F</text></svg>`;
}

    <div class="row" style="justify-content:space-between;margin-top:14px">
      ${c?`<button class="btn r sm" id="crm-del">Supprimer</button>`:"<span></span>"}
      <button class="btn" id="crm-save">${c?"Enregistrer":"Créer"}</button>
    </div>`);
  el("crm-save").onclick=async ()=>{
    const client=el("crm-client").value.trim(); if(!client) return toast("Nom du client requis");
    const data={ type:"crm", client, phone:el("crm-phone").value.trim(), status:el("crm-status").value, lastDate:el("crm-last").value||"", nextDate:el("crm-next").value||"", note:el("crm-note").value, author:session.userId, updated:nowISO() };
    if(c){ await wsUpdate("ws_announcements", c._id, data); toast("Relance mise à jour ✓"); }
    else { await wsAdd("ws_announcements", { id:uid(), ...data, created:nowISO() }); toast("Relance créée ✓"); }
    closeModal();
  };
  if(c) el("crm-del").onclick=()=> confirmDialog("Supprimer cette relance ?", async ()=>{ await wsDelete("ws_announcements", c._id); closeModal(); toast("Supprimée"); }, {danger:true, ok:"Supprimer"});
}

/* ============ SUIVI DES LIVRAISONS ============ */
// Stocké dans ws_announcements (type:"delivery") => pas de nouvelle collection.
const DLV_STATUS=[["prep","À préparer"],["route","En route"],["done","Livrée"]];
function deliveriesList(){ return wsAnnouncements.filter(a=>a.type==="delivery").sort((a,b)=>(b.created<a.created?-1:1)); }
function vDeliveries(){
  const all=deliveriesList();
  const cols=DLV_STATUS.map(([st,label])=>({st,label,items:all.filter(d=>(d.status||"prep")===st)}));
  return `
  <div class="row" style="justify-content:space-between;margin-bottom:14px">
    <div class="section-title">${icon('box',20)} Suivi des livraisons</div>
    <button class="btn b" id="dlv-new">${icon('plus',16)} Nouvelle livraison</button>
  </div>
  <div class="kanban">
    ${cols.map(col=>`
      <div class="kcol" data-dlvcol="${col.st}">
        <h4>${col.label} <span class="ct">${col.items.length}</span></h4>
        ${col.items.map(d=>`
          <div class="kcard" draggable="true" data-dlv="${esc(d._id)}">
            <div style="font-weight:700;font-size:13.5px">${esc(d.client||"Client")}</div>
            ${d.address?`<div class="muted" style="font-size:12px;margin-top:2px">${icon('home',12)} ${esc(d.address)}</div>`:""}
            <div class="row" style="gap:6px;margin-top:7px">
              ${d.orderRef?`<span class="pill todo">${esc(d.orderRef)}</span>`:""}
              ${d.driver?`<span class="pill doing">${icon('users',11)} ${esc(userName(d.driver)||d.driver)}</span>`:""}
            </div>
            ${d.address?`<a class="btn ghost sm" style="margin-top:8px" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.address)}" target="_blank" rel="noopener">${icon('home',12)} Voir sur la carte</a>`:""}
          </div>`).join("")||`<p class="muted" style="font-size:12px;padding:8px">—</p>`}
      </div>`).join("")}
  </div>
  <p class="muted" style="font-size:12px;margin-top:10px">Glissez une livraison d'une colonne à l'autre pour changer son statut. Cliquez une carte pour la modifier.</p>`;
}
function bindDeliveries(){
  const nw=el("dlv-new"); if(nw) nw.onclick=()=> deliveryDialog(null);
  document.querySelectorAll("[data-dlv]").forEach(card=>{
    card.onclick=()=>{ const d=deliveriesList().find(x=>x._id===card.dataset.dlv); deliveryDialog(d); };
    card.ondragstart=e=>{ e.dataTransfer.setData("id", card.dataset.dlv); };
  });
  document.querySelectorAll("[data-dlvcol]").forEach(col=>{
    col.ondragover=e=>e.preventDefault();
    col.ondrop=async e=>{ e.preventDefault(); const id=e.dataTransfer.getData("id"); if(id) await wsUpdate("ws_announcements", id, {status:col.dataset.dlvcol}); };
  });
}
function deliveryDialog(d){
  const drivers=users.filter(u=>u.active!==false).map(u=>`<option value="${u.id}" ${d&&d.driver===u.id?"selected":""}>${esc(u.name)}</option>`).join("");
  const clientOpts=(gestionState&&gestionState.clients||[]).map(cl=>`<option value="${esc(cl.name)}">${esc(cl.name)}</option>`).join("");
  openModal(`<div class="row" style="justify-content:space-between"><h3>${icon('box',16)} ${d?"Modifier la livraison":"Nouvelle livraison"}</h3><button class="x" onclick="closeModal()">×</button></div>
    <label>Client</label><input id="dlv-client" list="dlv-clients" value="${d?esc(d.client||""):""}" placeholder="Nom du client">
    <datalist id="dlv-clients">${clientOpts}</datalist>
    <label>Adresse de livraison</label><input id="dlv-address" value="${d?esc(d.address||""):""}" placeholder="Quartier, rue, repère…">
    <div class="grid g2">
      <div><label>Chauffeur / livreur</label><select id="dlv-driver"><option value="">—</option>${drivers}</select></div>
      <div><label>Statut</label><select id="dlv-status">${DLV_STATUS.map(([k,v])=>`<option value="${k}" ${d&&d.status===k?"selected":""}>${v}</option>`).join("")}</select></div>
      <div><label>N° commande (facultatif)</label><input id="dlv-order" value="${d?esc(d.orderRef||""):""}" placeholder="CMD-0042"></div>
      <div><label>Date prévue</label><input type="date" id="dlv-date" value="${d?d.date||"":""}"></div>
    </div>
    <label>Note (facultatif)</label><textarea id="dlv-note" rows="2" placeholder="Instructions, contact sur place…">${d?esc(d.note||""):""}</textarea>
    <div class="row" style="justify-content:space-between;margin-top:14px">
      ${d?`<button class="btn r sm" id="dlv-del">Supprimer</button>`:"<span></span>"}
      <button class="btn" id="dlv-save">${d?"Enregistrer":"Créer"}</button>
    </div>`);
  el("dlv-save").onclick=async ()=>{
    const client=el("dlv-client").value.trim(); if(!client) return toast("Nom du client requis");
    const data={ type:"delivery", client, address:el("dlv-address").value.trim(), driver:el("dlv-driver").value?+el("dlv-driver").value:"", status:el("dlv-status").value, orderRef:el("dlv-order").value.trim(), date:el("dlv-date").value||"", note:el("dlv-note").value, author:session.userId, updated:nowISO() };
    if(d){ await wsUpdate("ws_announcements", d._id, data); toast("Livraison mise à jour ✓"); }
    else { await wsAdd("ws_announcements", { id:uid(), ...data, created:nowISO() }); toast("Livraison créée ✓"); }
    closeModal();
  };
  if(d) el("dlv-del").onclick=()=> confirmDialog("Supprimer cette livraison ?", async ()=>{ await wsDelete("ws_announcements", d._id); closeModal(); toast("Supprimée"); }, {danger:true, ok:"Supprimer"});
}

/* ============ BOOT ============ */
(async function boot(){
  applyTheme();
  // PWA : enregistre le service worker s'il est présent (sans bloquer si absent)
  if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
  // Raccourci clavier global : Ctrl/Cmd + K = recherche
  document.addEventListener("keydown", e=>{
    if((e.ctrlKey||e.metaKey) && (e.key==="k"||e.key==="K")){ if(session){ e.preventDefault(); openCmdK(); } }
    if(e.key==="Escape"){ const m=el("modal"); if(m && m.innerHTML){ closeModal(); } }
  });
  render(); // login si pas de session
  if(session && FB_OK){
    try{
      await loadGestion();
      if(!users.find(u=>u.id===session.userId)){ logout(); return; }
      afterLogin();
    }catch(e){ console.warn("Boot:", e); render(); }
  }
})();
</script>
</body>
